<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* THE LOGO & NAV */
        nav { background: #0f172a; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .logo { font-size: 35px; font-weight: 900; color: var(--accent); text-decoration: none; }
        
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* CLIENT/EMPLOYER CARDS */
        .client-card { background: white; color: #0f172a; padding: 25px; border-radius: 15px; text-align: center; border-bottom: 5px solid var(--accent); }
        .salary-tag { color: var(--green); font-size: 26px; font-weight: 900; display: block; margin: 10px 0; }

        /* CERTEFICATE MODAL */
        #cert-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .certificate { background: white; color: black; padding: 50px; width: 600px; border: 15px double var(--yellow); text-align: center; font-family: 'serif'; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">ልማት Hub</a> <button onclick="document.getElementById('reg-modal').style.display='flex'" style="background:var(--green); border:none; padding:12px 25px; color:white; border-radius:8px; font-weight:bold; cursor:pointer;">REGISTRATION</button>
</nav>

<div class="container">
    <h2 style="color:var(--accent);">Employer Clients & Salaries</h2>
    <div class="grid" id="client-list"></div>
</div>

<div id="cert-overlay">
    <div class="certificate">
        <h3 style="margin:0; color:var(--card);">INDUSTRIAL RESEARCH RECORD</h3>
        <h1 style="font-size:50px; margin:10px 0;">CERTIFICATE</h1>
        <p>This is to certify that</p>
        <h2 id="cert-user" style="color:var(--accent); border-bottom: 2px solid #ddd; display:inline-block; padding:0 30px;">Student Name</h2>
        <p>has completed the professional track for</p>
        <h3 id="cert-course" style="color:var(--card);">Track Name</h3>
        <p style="margin-top:30px;">Awarded in Addis Ababa, 2026</p>
        <button onclick="document.getElementById('cert-overlay').style.display='none'" style="margin-top:20px; background:var(--card); color:white; padding:10px 20px; cursor:pointer; border:none;">DOWNLOAD & EXIT</button>
    </div>
</div>

<div id="reg-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9000; justify-content:center; align-items:center;">
    <div style="background:white; color:black; padding:30px; border-radius:15px; width:350px;">
        <h2 style="margin:0 0 15px 0;">Register</h2>
        <input type="text" id="user-n" placeholder="Full Name" style="width:100%; padding:10px; margin-bottom:10px;">
        <select id="user-f" style="width:100%; padding:10px; margin-bottom:10px;">
            <option>Feeling: Excited</option>
            <option>Feeling: Ambitious</option>
        </select>
        <button onclick="saveUser()" style="width:100%; background:var(--green); color:white; padding:15px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">LOCK IN PROFILE</button>
    </div>
</div>

<script>
    const clients = [
        {c: "Tech-Ethiopia", t: "Python for AI", s: "75,000 ETB"},
        {c: "Abyssinia Cloud", t: "Cloud Architecture", s: "85,000 ETB"},
        {c: "Green-Nile Power", t: "Solar Tech", s: "45,000 ETB"}
    ];

    let currentStudent = "Student";

    function render() {
        document.getElementById('client-list').innerHTML = clients.map(item => `
            <div class="client-card">
                <strong>${item.c}</strong><br>
                <small>Hiring for: ${item.t}</small>
                <span class="salary-tag">${item.s}</span>
                <button onclick="showCert('${item.t}')" style="background:var(--card); color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer;">VIEW CERTIFICATE</button>
            </div>`).join('');
    }

    function saveUser() {
        currentStudent = document.getElementById('user-n').value || "Student";
        document.getElementById('reg-modal').style.display = 'none';
        alert("Welcome " + currentStudent);
    }

    function showCert(track) {
        document.getElementById('cert-user').innerText = currentStudent;
        document.getElementById('cert-course').innerText = track;
        document.getElementById('cert-overlay').style.display = 'flex';
    }

    render();
</script>
</body>
</html>
