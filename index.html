<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Content Development</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .ticker { background: var(--yellow); color: black; padding: 12px; text-align: center; font-weight: 800; font-size: 13px; position: sticky; top: 0; z-index: 1000; }

        /* LEARNING INTERFACE */
        #learning-view { display: none; height: 100vh; grid-template-columns: 1fr 380px; position: fixed; top: 0; left: 0; width: 100%; background: var(--bg); z-index: 2000; }
        .video-area { padding: 30px; overflow-y: auto; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        
        .sidebar { background: var(--card); border-left: 1px solid #1e293b; padding: 20px; overflow-y: auto; }
        .lesson-card { padding: 15px; background: rgba(255,255,255,0.03); margin-bottom: 12px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .lesson-card:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }

        .writing-panel { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 15px; line-height: 1.8; color: #e2e8f0; border: 1px solid rgba(255,255,255,0.05); }
        .step-badge { background: var(--accent); color: black; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; margin-right: 8px; }

        /* DASHBOARD */
        .container { padding: 40px 5%; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
    </style>
</head>
<body>

<div class="ticker">📚 LESSONS UPDATED: DETAILED WRITTEN GUIDES ACTIVE FOR TOP TRACKS</div>

<div id="dashboard">
    <div class="container">
        <h2>Select a Track to Work on Lessons</h2>
        <div class="track-grid" id="track-grid"></div>
    </div>
</div>

<div id="learning-view">
    <div class="video-area">
        <button onclick="closeL()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; margin-bottom:20px;">← BACK</button>
        <h2 id="view-title" style="color:var(--accent);">Course Title</h2>
        
        <div class="video-box">
            <div style="text-align:center;">
                <span id="play-btn" style="font-size:60px; color:var(--accent);">▶</span>
                <p id="active-lesson-title">Select a module to start</p>
            </div>
        </div>

        <div class="writing-panel">
            <h3 id="write-head">Detailed Lesson Guide</h3>
            <div id="write-body">Choose a lesson from the sidebar to load the technical steps and video module.</div>
        </div>
    </div>

    <div class="sidebar">
        <h3 style="border-bottom: 1px solid #1e293b; padding-bottom: 10px;">Course Modules</h3>
        <div id="lesson-list"></div>
    </div>
</div>

<script>
    const tracks = [
        {
            id: 1, n: "Python for AI", g: "AI Engineer", img: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500",
            lessons: [
                {t: "Environment Setup", w: "<b>Step 1:</b> Install VS Code and Python 3.10+. <br><b>Step 2:</b> Open your terminal and type 'pip install numpy pandas'. <br><b>Step 3:</b> Create your first .py file to verify the installation."},
                {t: "Data Handling with Pandas", w: "<b>Overview:</b> Pandas is used for data manipulation. <br><b>Practice:</b> Use 'df.read_csv()' to load the dataset. Use 'df.head()' to view the first 5 rows of AI training data."},
                {t: "Building a Simple Model", w: "<b>Goal:</b> Create a linear regression. <br><b>Code:</b> Import Scikit-Learn. Define your X (features) and y (target). Call 'model.fit()' to begin training."}
            ]
        },
        {
            id: 2, n: "Cyber Security", g: "Security Analyst", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500",
            lessons: [
                {t: "Network Reconnaissance", w: "<b>Step 1:</b> Understanding IP ranges. <br><b>Step 2:</b> Using Nmap for basic port scanning (Ethical use only). <br><b>Step 3:</b> Identifying open services on a target machine."},
                {t: "Password Security", w: "<b>Topic:</b> Hashing vs Encryption. <br><b>Task:</b> Learn how salts are added to passwords to prevent Rainbow Table attacks."}
            ]
        },
        {
            id: 3, n: "Modern Carpentry", g: "Master Carpenter", img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=500",
            lessons: [
                {t: "Wood Science", w: "<b>Lesson:</b> Understanding moisture content. <br><b>Task:</b> Identify the difference between Wanza and Tid wood. Learn why seasoning wood prevents warping."},
                {t: "Joint Geometry", w: "<b>Technique:</b> The Mortise and Tenon joint. <br><b>Execution:</b> Mark the shoulder, cut the tenon cheek, and ensure a tight friction fit."}
            ]
        }
        // Additional 12 tracks can be expanded here...
    ];

    function render() {
        document.getElementById('track-grid').innerHTML = tracks.map(t => `
            <div class="card" onclick="openL(${t.id})">
                <img src="${t.img}" style="width:100%; height:160px; object-fit:cover;">
                <div style="padding:15px;">
                    <h3>${t.n}</h3>
                    <p style="opacity:0.6; font-size:14px;">Goal: ${t.g}</p>
                    <p style="color:var(--accent); font-weight:bold;">WORK ON LESSONS →</p>
                </div>
            </div>`).join('');
    }

    function openL(id) {
        const t = tracks.find(x => x.id === id);
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('learning-view').style.display = 'grid';
        document.getElementById('view-title').innerText = t.n;
        
        document.getElementById('lesson-list').innerHTML = t.lessons.map(l => `
            <div class="lesson-card" onclick="loadLesson('${l.t}', '${l.w.replace(/'/g, "\\'")}')">
                <strong>${l.t}</strong><br>
                <small style="color:var(--accent);">Video + Writing Ready</small>
            </div>`).join('');
    }

    function loadLesson(title, writing) {
        document.getElementById('active-lesson-title').innerText = title;
        document.getElementById('write-head').innerText = "Step-by-Step: " + title;
        document.getElementById('write-body').innerHTML = writing;
        document.getElementById('play-btn').innerText = "⏳";
        setTimeout(() => { document.getElementById('play-btn').innerText = "▶"; }, 400);
    }

    function closeL() {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('learning-view').style.display = 'none';
    }

    render();
</script>
</body>
</html>
