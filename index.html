<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --success: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* YELLOW TICKER */
        .ticker { background: var(--yellow); color: black; padding: 12px; text-align: center; font-weight: 800; font-size: 13px; position: sticky; top: 0; z-index: 100; }

        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .logo { color: var(--accent); font-size: 24px; font-weight: 800; text-decoration: none; }

        /* HERO & IDENTITY */
        .hero { padding: 50px 20px; text-align: center; }
        .id-input { background: rgba(255,255,255,0.05); border: 1.5px solid var(--accent); color: white; padding: 15px; width: 280px; border-radius: 10px; text-align: center; font-size: 18px; margin-bottom: 15px; }
        .v-btn { background: var(--accent); color: black; border: none; padding: 15px 40px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        /* LIVE JOB BOARD */
        .job-section { padding: 25px 5%; background: rgba(56, 189, 248, 0.02); border-bottom: 1px solid #1e293b; }
        .job-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .job-card { background: var(--card); border: 1px solid var(--yellow); padding: 15px; border-radius: 12px; min-width: 240px; }

        /* 15 CAREER TRACKS */
        .container { padding: 40px 5%; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; height: 170px; object-fit: cover; background: #1e293b; }
        .card-body { padding: 20px; }

        /* VIDEO PLAYER VIEW */
        #learning-view { display: none; padding: 40px 5%; text-align: center; }
        .video-box { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; margin: 20px auto; border: 2px solid var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="ticker">🚀 DIGITAL ETHIOPIA 2026: 15 CERTIFIED TRACKS ACTIVE | FAYDA ID VERIFICATION REQUIRED | NEXT JOB FAIR: MARCH 15</div>

<header id="main-nav">
    <a href="#" class="logo">ልማት Hub</a>
</header>

<div id="dashboard">
    <div class="hero">
        <h1>National Career Hub</h1>
        <p>Verify your Fayda ID to begin</p>
        <input type="number" id="f-id" class="id-input" placeholder="Enter 10 Digits"> <br>
        <button class="v-btn" onclick="alert('ID Verified!')">VERIFY IDENTITY</button>
    </div>

    <div class="job-section">
        <h3 style="margin-top:0;">Live Job Board (2026)</h3>
        <div class="job-grid" id="job-list"></div>
    </div>

    <div class="container">
        <h2>Your Professional Tracks</h2>
        <div class="track-grid" id="track-grid"></div>
    </div>
</div>

<div id="learning-view">
    <button onclick="closeLearning()" style="background:var(--accent); padding:10px 20px; border-radius:5px; cursor:pointer;">← BACK</button>
    <h2 id="course-name">Course</h2>
    <div class="video-box">
        <div style="font-size:50px; color:var(--accent);">▶</div>
    </div>
    <p>Loading Module 1: Introduction...</p>
</div>

<script>
    const tracks = [
        {id: 1, n: "Python for AI", g: "AI Engineer", img: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500"},
        {id: 2, n: "Cyber Security", g: "Security Analyst", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500"},
        {id: 3, n: "Full-Stack Web", g: "Web Developer", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500"},
        {id: 4, n: "Cloud Architecture", g: "Cloud Engineer", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500"},
        {id: 5, n: "Mobile App Dev", g: "Mobile Developer", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=500"},
        {id: 6, n: "Modern Carpentry", g: "Master Carpenter", img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=500"},
        {id: 7, n: "Electrical Systems", g: "Electrician", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=500"},
        {id: 8, n: "Solar Tech", g: "Solar Installer", img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=500"},
        {id: 9, n: "UI/UX Design", g: "Product Designer", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=500"},
        {id: 10, n: "Data Science", g: "Data Scientist", img: "https://images.unsplash.com/photo-1551288049-bbbda536339a?w=500"},
        {id: 11, n: "Auto Mechanics", g: "Auto Tech", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500"},
        {id: 12, n: "Masonry Tech", g: "Master Mason", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=500"},
        {id: 13, n: "Welding Tech", g: "Industrial Welder", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=500"},
        {id: 14, n: "Network Admin", g: "Network Engineer", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=500"},
        {id: 15, n: "Plumbing Tech", g: "Master Plumber", img: "https://images.unsplash.com/photo-1585704032915-c3400ca1f963?w=500"}
    ];

    function render() {
        // Render Jobs
        document.getElementById('job-list').innerHTML = tracks.slice(0, 5).map(t => `
            <div class="job-card">
                <span style="background:var(--yellow); color:black; font-size:10px; font-weight:800; padding:2px 5px; border-radius:4px;">OPENING</span>
                <h4 style="margin:10px 0 5px 0;">${t.g}</h4>
                <div style="font-size:12px; opacity:0.7;">Ethio-Systems • Addis Ababa</div>
            </div>`).join('');

        // Render 15 Tracks
        document.getElementById('track-grid').innerHTML = tracks.map(t => `
            <div class="card" onclick="startLearning('${t.n}')">
                <img src="${t.img}" class="card-img" alt="${t.n}">
                <div class="card-body">
                    <h3 style="margin:0;">${t.n}</h3>
                    <p style="opacity:0.6; font-size:14px; margin:8px 0;">Goal: ${t.g}</p>
                    <p style="color:var(--accent); font-weight:bold; font-size:12px;">5 LESSONS AVAILABLE →</p>
                </div>
            </div>`).join('');
    }

    function startLearning(name) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('main-nav').style.display = 'none';
        document.getElementById('learning-view').style.display = 'block';
        document.getElementById('course-name').innerText = name;
    }

    function closeLearning() {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('learning-view').style.display = 'none';
    }

    render();
</script>
</body>
</html>
