<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* THIS TAG STOPS THE WHITE SCREEN */
        :root { --dark: #070b14; --accent: #38bdf8; --yellow: #fbbf24; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .job-section { background: rgba(56, 189, 248, 0.05); padding: 20px 5%; border-bottom: 1px solid var(--accent); }
        .job-card { background: #111827; padding: 15px; border-radius: 12px; border: 1px solid var(--yellow); min-width: 220px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: #111827; border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="job-section">
        <h2 style="color:var(--accent);">Live Job Board (2026)</h2>
        <div id="job-container" style="display:flex; gap:15px; overflow-x:auto;">
            </div>
    </div>

    <div class="grid" id="main-grid"></div>

    <script>
        /* THIS TAG STOPS THE TEXT FROM SHOWING */
        const tracks = [
            {id: 1, n: "Modern Carpentry", icon: "🪚"},
            {id: 3, n: "AI Engineering", icon: "🤖"}
            // ... Add your full list here
        ];

        function render() {
            const enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
            document.getElementById('main-grid').innerHTML = tracks.map(t => `
                <div class="card">
                    <h1 style="font-size:40px;">${t.icon}</h1>
                    <h3>${t.n}</h3>
                    <div style="color:${enrolled.includes(t.id) ? '#10b981' : '#374151'}">
                        ${enrolled.includes(t.id) ? '✓ ENROLLED' : 'VIEW SYLLABUS'}
                    </div>
                </div>
            `).join('');
        }
        render();
    </script>
</body>
</html>
