<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Master 2026</title>
    <style>
        :root { --teal: #00bfa5; --coral: #ff7675; --bg: #05080f; --card: #0f172a; --yellow: #fbbf24; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* HEADER & TICKER */
        .ticker { background: var(--yellow); color: black; padding: 10px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 3000; }
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 40px; z-index: 2000; }
        .logo { font-size: 28px; font-weight: 900; color: var(--teal); cursor: pointer; }
        .logo span { color: #333; font-weight: 400; }

        /* GRID & FACTORY DASHBOARD */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--teal); transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .factory-row { background: white; color: #333; margin-bottom: 12px; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--teal); }
        .salary { font-size: 18px; font-weight: bold; color: var(--teal); }

        /* REGISTRATION FORM (PERSONAL INFO) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; justify-content: center; align-items: center; }
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 15px; width: 400px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

        /* AI ASSISTANT */
        #ai-box { position: fixed; bottom: 85px; right: 20px; width: 320px; background: #0f172a; border: 1px solid var(--teal); border-radius: 12px; display: none; z-index: 4000; }
        .ai-header { background: var(--teal); color: black; padding: 12px; font-weight: bold; }
        .ai-chat { height: 200px; padding: 15px; overflow-y: auto; font-size: 14px; }
        .ai-toggle { position: fixed; bottom: 20px; right: 20px; background: var(--teal); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 4001; }

        /* TRACKER */
        #tracker-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 50px; text-align: center; }
        .bar-fill { background: var(--teal); height: 20px; width: 0%; border-radius: 10px; transition: 0.1s; }
    </style>
</head>
<body>

<div class="ticker">🚀 2026 INDUSTRIAL HUB | 15 RESEARCH TRACKS LIVE | SALARY: 85,000 ETB</div>

<header>
    <div class="logo">ልማት<span>hub</span></div>
    <button onclick="openReg('General')" style="background:var(--teal); color:white; border:none; padding:10px 25px; border-radius:50px; font-weight:700; cursor:pointer;">REGISTER NOW</button>
</header>

<div class="container">
    <h2 style="color: var(--teal);">Select Industrial Track (15)</h2>
    <div class="grid" id="course-grid"></div>
</div>

<div class="container" style="background: rgba(0, 191, 165, 0.03);">
    <h2 style="color: var(--yellow);">Employer Factory Dashboard</h2>
    <div id="factory-list"></div>
</div>

<div id="reg-modal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--teal)">Personal Information</h2>
        <div class="form-group"><input type="text" id="p-name" placeholder="Full Name"></div>
        <div class="form-group"><input type="tel" id="p-phone" placeholder="Phone (+251)"></div>
        <div class="form-group">
            <select id="p-region">
                <option>Addis Ababa</option>
                <option>Oromia</option>
                <option>Amhara</option>
            </select>
        </div>
        <button onclick="submitInfo()" style="background:var(--teal); color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT TO FACTORY</button>
        <p onclick="document.getElementById('reg-modal').style.display='none'" style="text-align:center; color:red; cursor:pointer; margin-top:10px;">Cancel</p>
    </div>
</div>

<div id="tracker-overlay">
    <h1 id="track-name" style="margin-top:100px; color:var(--teal);">Researching...</h1>
    <div style="background:#1e293b; width:80%; margin:20px auto; border-radius:10px;"><div class="bar-fill" id="fill-bar"></div></div>
    <p>Status: Active Research Phase</p>
</div>

<div id="ai-box">
    <div class="ai-header">AI Hub Assistant</div>
    <div id="ai-chat" class="ai-chat">AI: Welcome! Need help with salaries?</div>
    <div style="padding:10px; display:flex;"><input type="text" id="ai-q" style="flex:1"><button onclick="askAI()">Send</button></div>
</div>
<button class="ai-toggle" onclick="toggleAI()">AI</button>

<script>
    const data = [
        {n: "Python for AI", r: "7,000 ETB", s: "75,000 ETB", e: "Ethio-Tech Factory", img: "https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?w=400"},
        {n: "Solar Energy", r: "4,500 ETB", s: "45,000 ETB", e: "Nile-Solar Plant", img: "https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg?w=400"},
        {n: "Cloud Systems", r: "8,500 ETB", s: "85,000 ETB", e: "Abyssinia Cloud Hub", img: "https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg?w=400"}
    ];

    function render() {
        document.getElementById('course-grid').innerHTML = data.map(t => `<div class="card" onclick="startTracker('${t.n}')"><img src="${t.img}"><div style="padding:15px;"><strong>${t.n}</strong><br><small style="color:var(--yellow)">Reg: ${t.r}</small></div></div>`).join('');
        document.getElementById('factory-list').innerHTML = data.map(t => `<div class="factory-row"><div><strong>${t.e}</strong><br><small>${t.n}</small></div><div style="text-align:right"><div class="salary">${t.s}</div><button onclick="openReg('${t.n}')" style="background:var(--coral); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Register</button></div></div>`).join('');
    }

    function startTracker(name) {
        document.getElementById('track-name').innerText = name;
        document.getElementById('tracker-overlay').style.display = 'block';
        let w = 0; let b = document.getElementById('fill-bar');
        let t = setInterval(() => { if(w >= 100) clearInterval(t); else { w++; b.style.width = w + '%'; } }, 30);
    }

    function openReg(c) { document.getElementById('reg-modal').style.display = 'flex'; }
    function submitInfo() { alert("Information Received! Factory will contact you."); document.getElementById('reg-modal').style.display = 'none'; }
    function toggleAI() { let x = document.getElementById('ai-box'); x.style.display = (x.style.display === 'block') ? 'none' : 'block'; }
    function askAI() { let q = document.getElementById('ai-q').value; document.getElementById('ai-chat').innerHTML += `<div><b>You:</b> ${q}</div><div style="color:var(--teal)"><b>AI:</b> Cloud salary is 85k!</div>`; }
    render();
</script>
</body>
</html>
