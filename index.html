<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Interactive Fix</title>
    <style>
        :root { --dark: #0f172a; --accent: #38bdf8; --yellow: #FFD700; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #f8fafc; line-height: 1.6; }
        
        /* TICKER & HEADER */
        header { background: rgba(15, 23, 42, 0.98); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent); text-decoration: none; }
        .yellow-tracker { background: var(--yellow); color: #000; padding: 10px; font-weight: 800; overflow: hidden; white-space: nowrap; }
        .scrolling-text { display: inline-block; animation: scroll 35s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* GRID */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .card { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 15px; }

        /* THE MODAL (MADE VISIBLE) */
        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: none; /* Controlled by JS */
            justify-content: center; align-items: center; 
            z-index: 9999; /* Higher than everything else */
            backdrop-filter: blur(10px); 
        }
        .modal-box { 
            background: #1e293b; padding: 30px; border-radius: 25px; 
            max-width: 450px; width: 90%; 
            border: 3px solid var(--accent); /* Thick border to make it visible */
            text-align: center; box-shadow: 0 0 50px rgba(56, 189, 248, 0.3);
        }
        .progress-bar { width: 100%; height: 10px; background: #000; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--yellow); width: 0%; transition: 1.5s ease; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ልማት Hub</a>
    <div style="font-size: 0.8rem; color: var(--accent);">2026 OFFICIAL</div>
</header>

<div class="yellow-tracker">
    <div class="scrolling-text">Touch a course to view details. | 15 Tracks restored. | Verified by Robel.</div>
</div>

<div class="container">
    <div class="grid" id="course-grid"></div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h2 id="m-title" style="color:var(--accent); margin-bottom:5px;"></h2>
        <p id="m-job" style="color:#94a3b8; margin-bottom:15px;"></p>
        <div class="progress-bar"><div id="m-fill" class="progress-fill"></div></div>
        <p style="text-align:left; font-size:0.9rem;"><strong>What you learn:</strong><br><span id="m-syl"></span></p>
        <button onclick="closeModal()" style="margin-top:20px; background:var(--accent); color:#000; border:none; padding:10px 30px; border-radius:10px; font-weight:bold; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const tracks = [
        {n: "Modern Carpentry", img: "https://images.unsplash.com/photo-1621290621119-7d1c103bc3f1?w=500", job: "Master Carpenter", syl: "Safety, Furniture Design, Finishing"},
        {n: "Electrical Systems", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=500", job: "Electrician", syl: "Solar Wiring, Circuit Design, Testing"},
        {n: "AI Engineering", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=500", job: "AI Specialist", syl: "Neural Networks, Python, ML Models"},
        {n: "Cyber Security", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500", job: "Security Officer", syl: "Network Defense, Hacking Ethics, Audit"},
        {n: "Auto Mechanics", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500", job: "Technician", syl: "EV Diagnostics, Engine Repair, Hybrid"},
        {n: "Web Systems", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500", job: "Full-Stack Dev", syl: "React, Node.js, Database API"},
        {n: "Data Science", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500", job: "Data Architect", syl: "SQL Analysis, Predictive Models, Big Data"},
        {n: "Welding & Metal", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=500", job: "Metal Expert", syl: "Arc/MIG Welding, Blueprint, Metal Safety"}
    ];

    function render() {
        document.getElementById('course-grid').innerHTML = tracks.map((t, i) => `
            <div class="card" onclick="openModal(${i})">
                <img src="${t.img}">
                <div class="card-body">
                    <div style="font-weight:bold;">${t.n}</div>
                    <div style="font-size:0.7rem; color:var(--accent);">${t.job}</div>
                </div>
            </div>`).join('');
    }

    function openModal(i) {
        const t = tracks[i];
        document.getElementById('m-title').innerText = t.n;
        document.getElementById('m-job').innerText = t.job;
        document.getElementById('m-syl').innerText = t.syl;
        document.getElementById('modal-overlay').style.display = 'flex';
        
        // Animating the progress bar
        setTimeout(() => {
            document.getElementById('m-fill').style.width = (Math.random() * 60 + 20) + "%";
        }, 100);
    }

    function closeModal() {
        document.getElementById('m-fill').style.width = "0%";
        document.getElementById('modal-overlay').style.display = 'none';
    }

    render();
</script>
</body>
</html>
