<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --success: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* THE YELLOW TICKER */
        .ticker { background: var(--yellow); color: black; padding: 12px; text-align: center; font-weight: 900; font-size: 14px; position: sticky; top: 0; z-index: 100; text-transform: uppercase; }

        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .logo { color: var(--accent); font-size: 24px; font-weight: 800; text-decoration: none; }
        .lang-btn { background: #1e293b; color: white; border: 1px solid var(--accent); padding: 6px 14px; border-radius: 6px; cursor: pointer; }

        .container { padding: 30px 5%; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        /* COURSE CARDS */
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; }

        /* LEARNING VIEW */
        #learning-view { display: none; padding: 0; height: 100vh; grid-template-columns: 1fr 350px; }
        .video-container { background: #000; padding: 40px; display: flex; flex-direction: column; }
        .video-player { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 15px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; }
        .sidebar { background: var(--card); border-left: 1px solid #1e293b; padding: 20px; overflow-y: auto; }
        .lesson-item { padding: 15px; background: rgba(255,255,255,0.05); margin-bottom: 10px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
        .lesson-item:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="ticker">🚀 Digital Ethiopia 2026: 15 Certified Tracks Active | Fayda ID Verification Required | Next Job Fair: March 15</div>

<header id="main-header">
    <a href="#" class="logo">ልማት Hub</a>
    <button class="lang-btn">አማርኛ / EN</button>
</header>

<div id="main-view">
    <div class="container">
        <h2 style="margin-bottom: 30px; font-size: 28px;">Advanced Programming & Technical Tracks</h2>
        <div class="track-grid" id="track-grid"></div>
    </div>
</div>

<div id="learning-view">
    <div class="video-container">
        <button onclick="closeLearning()" style="width:100px; background:var(--accent); color:black; border:none; padding:10px; border-radius:5px; margin-bottom:20px; cursor:pointer;">← EXIT</button>
        <h2 id="current-course-title">Course Title</h2>
        <div class="video-player">
            <div style="text-align:center;">
                <p style="font-size:50px; color:var(--accent);">▶</p>
                <p id="current-module">Module 1: Getting Started</p>
            </div>
        </div>
        <div style="margin-top:20px;">
            <h3>Resources</h3>
            <button style="padding:10px; background:var(--success); color:white; border:none; border-radius:5px; cursor:pointer;">Download PDF Guide</button>
        </div>
    </div>
    <div class="sidebar">
        <h3>Course Content</h3>
        <div id="lesson-list"></div>
    </div>
</div>

<script>
    const tracks = [
        {id: 1, n: "Python for AI", g: "AI Engineer", img: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500", 
         vids: ["Introduction to AI", "Python Variables", "Logic & Loops", "NumPy Basics", "Machine Learning Intro"]},
        {id: 2, n: "Cyber Security", g: "Security Analyst", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500", 
         vids: ["Defense Fundamentals", "Encryption Tech", "Network Scanning", "Malware Analysis", "Final Project"]},
        {id: 3, n: "Full-Stack Web", g: "Web Developer", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500", 
         vids: ["HTML5 & CSS3", "Modern JavaScript", "React Components", "Node.js Backend", "SQL Databases"]},
        {id: 4, n: "Cloud Architecture", g: "Cloud Engineer", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500", 
         vids: ["Cloud Basics", "Serverless Computing", "Identity Access (IAM)", "Network VPC", "Cost Management"]},
        {id: 5, n: "Mobile App Dev", g: "Mobile Developer", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=500", 
         vids: ["Flutter Setup", "UI Design", "Firebase Auth", "API Integration", "Store Deployment"]}
        // Imagine 10 more tracks added here...
    ];

    function render() {
        document.getElementById('track-grid').innerHTML = tracks.map(t => `
            <div class="card" onclick="openLearning(${t.id})">
                <img src="${t.img}" class="card-img" alt="${t.n}">
                <div class="card-body">
                    <h3 style="margin:0;">${t.n}</h3>
                    <p style="opacity:0.6; font-size:14px; margin:10px 0;">Goal: ${t.g}</p>
                    <p style="color:var(--accent); font-weight:bold;">${t.vids.length} LESSONS AVAILABLE →</p>
                </div>
            </div>`).join('');
    }

    function openLearning(id) {
        const t = tracks.find(x => x.id === id);
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('main-header').style.display = 'none';
        document.getElementById('learning-view').style.display = 'grid';
        
        document.getElementById('current-course-title').innerText = t.n;
        document.getElementById('lesson-list').innerHTML = t.vids.map((v, i) => `
            <div class="lesson-item" onclick="playLesson('${v}')">
                <span style="color:var(--accent); margin-right:10px;">0${i+1}</span> ${v}
            </div>`).join('');
    }

    function playLesson(title) {
        document.getElementById('current-module').innerText = title;
    }

    function closeLearning() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('learning-view').style.display = 'none';
    }

    render();
</script>
</body>
</html>
