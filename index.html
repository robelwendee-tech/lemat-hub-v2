<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .ticker { background: var(--yellow); color: black; padding: 12px; text-align: center; font-weight: 800; font-size: 14px; position: sticky; top: 0; z-index: 1000; }
        nav { background: #0f172a; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }

        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* COURSE CARDS */
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; }

        /* THE STUDY ROOM (Hidden by default) */
        #study-room { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; grid-template-columns: 1fr 350px; }
        .study-content { padding: 40px; overflow-y: auto; border-right: 1px solid #1e293b; }
        .sidebar { background: #0f172a; padding: 30px; }

        /* REGISTRATION MODAL */
        #reg-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; justify-content: center; align-items: center; }
        .reg-box { background: white; color: black; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>

<div class="ticker">🚀 SELECT A COURSE TO START YOUR 2026 CERTIFICATION</div>

<nav>
    <div style="font-size: 26px; font-weight: 900; color: var(--accent);">ልማት Hub</div>
    <button onclick="document.getElementById('reg-modal').style.display='flex'" style="background:var(--green); border:none; padding:10px 20px; color:white; border-radius:5px; font-weight:bold; cursor:pointer;">REGISTRATION</button>
</nav>

<div id="hub-display">
    <div class="container">
        <h2 style="color:var(--accent);">Professional Tracks (15)</h2>
        <div class="grid" id="course-list"></div>
    </div>
</div>

<div id="study-room">
    <div class="study-content">
        <button onclick="closeStudy()" style="background:var(--yellow); border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer; margin-bottom:20px;">← BACK TO HUB</button>
        <h1 id="course-title" style="color:var(--accent);"></h1>
        <div id="course-visual" style="width:100%; height:300px; border-radius:15px; overflow:hidden; margin-bottom:20px; border:2px solid var(--accent);"></div>
        <div style="background:rgba(255,255,255,0.02); padding:25px; border-radius:15px; border:1px solid rgba(255,255,255,0.1);">
            <h3 style="color:var(--green);">2026 Industrial Research</h3>
            <p id="course-data" style="line-height:1.7; color:#cbd5e1;"></p>
            <button onclick="alert('Certification Quiz Loading...')" style="background:var(--green); color:white; border:none; padding:15px 30px; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:15px;">TAKE EXAM</button>
        </div>
    </div>
    <div class="sidebar">
        <h3>Training Modules</h3>
        <div style="background:var(--accent); color:black; padding:15px; border-radius:8px; font-weight:bold;">Module 1: Research Phase</div>
    </div>
</div>

<div id="reg-modal">
    <div class="reg-box">
        <h2 style="margin-top:0;">Personal Details</h2>
        <input type="text" placeholder="Full Name">
        <input type="number" placeholder="Age">
        <input type="email" placeholder="Email Address">
        <button onclick="document.getElementById('reg-modal').style.display='none'" style="width:100%; background:var(--green); color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT</button>
    </div>
</div>

<script>
    const tracks = [
        {id: 1, n: "Python for AI", r: "Researching Python 3.12 and Fayda ID API integration for Ethiopian digital services.", img: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=600"},
        {id: 4, n: "Cloud Architecture", r: "Auditing local server infrastructure and implementing AES-256 encryption protocols.", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600"},
        {id: 8, n: "Solar Tech", r: "Configuring hybrid inverters and PV array layouts for grid-independent energy solutions.", img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=600"},
        {id: 14, n: "EV Technician", r: "Diagnostic research on Electric Vehicle (EV) drivetrains and smart battery management.", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=600"},
        {id: 5, n: "Plumbing Tech", r: "High-pressure hydraulic research for luxury high-rise residential waste management.", img: "https://images.unsplash.com/photo-1585704032915-c3400ca1f963?w=600"}
    ];

    function render() {
        document.getElementById('course-list').innerHTML = tracks.map(t => `
            <div class="card" onclick="openStudy(${t.id})">
                <img src="${t.img}">
                <div class="card-body">
                    <strong>${t.n}</strong>
                    <p style="font-size:12px; color:var(--accent); margin-top:5px;">Click to open course</p>
                </div>
            </div>`).join('');
    }

    function openStudy(id) {
        const item = tracks.find(x => x.id === id);
        document.getElementById('hub-display').style.display = 'none';
        document.getElementById('study-room').style.display = 'grid';
        document.getElementById('course-title').innerText = item.n;
        document.getElementById('course-data').innerText = item.r;
        document.getElementById('course-visual').innerHTML = `<img src="${item.img}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function closeStudy() {
        document.getElementById('hub-display').style.display = 'block';
        document.getElementById('study-room').style.display = 'none';
    }

    render();
</script>
</body>
</html>
