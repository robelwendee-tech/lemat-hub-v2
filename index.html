<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* ANIMATED TICKER */
        .ticker-wrap { background: var(--yellow); color: black; padding: 12px; font-weight: 800; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 1000; }
        .ticker-move { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        nav { background: #0f172a; padding: 15px 5%; display: flex; justify-content: center; border-bottom: 1px solid #1e293b; }
        .main-logo { font-size: 32px; font-weight: 900; color: var(--accent); margin: 0; }

        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        
        /* PARTNER SECTION */
        .company-card { background: white; color: #0f172a; padding: 20px; border-radius: 12px; }
        .salary-box { color: var(--green); font-size: 24px; font-weight: 900; margin-top: 10px; }

        /* STUDY ROOM */
        #study-room { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 40px; }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker-move">🌍 2026 INDUSTRIAL HUB | 15 TRACKS LIVE | HIGHEST SALARY: 85,000 ETB | CLICK A COURSE TO START LEARNING 🚀</div>
</div>

<nav><h1 class="main-logo">ልማት Hub</h1></nav>

<div class="container">
    <h2 style="color:var(--accent);">Select Your Course (15)</h2>
    <div class="grid" id="course-list"></div>
</div>

<div class="container" style="background: rgba(56, 189, 248, 0.05);">
    <h2 style="color:var(--yellow);">Partner Companies & Salaries</h2>
    <div class="grid" id="company-list"></div>
</div>

<div id="study-room">
    <button onclick="document.getElementById('study-room').style.display='none'" style="background:var(--yellow); padding:10px 20px; border:none; cursor:pointer; font-weight:bold;">← BACK</button>
    <h1 id="study-title" style="color:var(--accent); margin-top:20px;"></h1>
    <div style="background:var(--card); padding:20px; border-radius:12px; margin-top:20px;">
        <h3>📊 Research Tracker</h3>
        <p id="study-phase"></p>
    </div>
</div>

<script>
    const data = [
        {n: "Python for AI", s: "75,000 ETB", c: "Tech-Ethiopia", r: "Researching Python 3.12 and Local API Integration.", img: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=400"},
        {n: "Solar Energy", s: "45,000 ETB", c: "Green-Nile Power", r: "Testing Photovoltaic Storage efficiency.", img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=400"},
        {n: "Cloud Systems", s: "85,000 ETB", c: "Abyssinia Cloud", r: "Optimizing Serverless Architecture.", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400"},
        {n: "EV Engineering", s: "65,000 ETB", c: "Eco-Drive Motors", r: "Analyzing EV Battery diagnostics.", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=400"},
        // ... imagine 11 more tracks here to reach 15
        {n: "Cyber Security", s: "70,000 ETB", c: "Safe-Net Africa", r: "Network penetration testing labs.", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400"}
    ];

    function render() {
        document.getElementById('course-list').innerHTML = data.map((t, i) => `
            <div class="card" onclick="openStudy(${i})">
                <img src="${t.img}">
                <div style="padding:15px;"><strong>${t.n}</strong><br><small>Click to Learn</small></div>
            </div>`).join('');
            
        document.getElementById('company-list').innerHTML = data.map(t => `
            <div class="company-card">
                <strong>${t.c}</strong><br><small>Hiring: ${t.n}</small>
                <div class="salary-box">${t.s}</div>
            </div>`).join('');
    }

    function openStudy(idx) {
        const item = data[idx];
        document.getElementById('study-title').innerText = item.n;
        document.getElementById('study-phase').innerText = "Current Phase: " + item.r;
        document.getElementById('study-room').style.display = 'block';
    }

    render();
</script>
</body>
</html>
