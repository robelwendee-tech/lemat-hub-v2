<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --dark: #070b14; --card-bg: #111827; --accent: #38bdf8; --yellow: #fbbf24; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, #111827, #070b14); color: #f3f4f6; scroll-behavior: smooth; min-height: 100vh; }
        
        header { background: rgba(7, 11, 20, 0.85); backdrop-filter: blur(15px); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass); }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); text-decoration: none; }
        .l-btn { padding: 6px 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; border-radius: 8px; font-weight: bold; margin-left: 5px; }
        .l-btn.active { background: var(--accent); color: var(--dark); }

        .yellow-ticker { background: var(--yellow); color: #000; padding: 12px; font-weight: 700; overflow: hidden; white-space: nowrap; }
        .scrolling-text { display: inline-block; animation: scroll 35s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .hero { padding: 60px 20px; text-align: center; }
        .id-input { background: rgba(255,255,255,0.05); border: 2px solid var(--accent); color: white; padding: 15px; width: 300px; border-radius: 12px; text-align: center; margin: 20px 0; outline: none; font-size: 1.2rem; }
        .v-btn { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding-bottom: 50px; }
        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid var(--glass); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* FIX FOR BLACK BOXES: This gradient shows if image fails */
        .card img { width: 100%; height: 180px; object-fit: cover; background: linear-gradient(45deg, #1e293b, #070b14); display: block; }
        .card-body { padding: 1.5rem; }
        .job-badge { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 6px 12px; border-radius: 99px; font-size: 0.75rem; border: 1px solid rgba(56,189,248,0.2); display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ልማት Hub</a>
    <div>
        <button class="l-btn active" onclick="setL('en')" id="en-btn">EN</button>
        <button class="l-btn" onclick="setL('am')" id="am-btn">አማር</button>
    </div>
</header>

<div class="yellow-ticker">
    <div class="scrolling-text">Certified by Digital Ethiopia 2026 | 15 Career Tracks Active | Developer: Robel</div>
</div>

<div class="hero" id="hero-sec"></div>

<div class="container">
    <h2 style="margin-bottom:25px;" id="h-tr">15 Career Tracks</h2>
    <div class="grid" id="course-grid"></div>
</div>

<script>
    const tracks = [
        {n: "Modern Carpentry", img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=600", job: "Master Carpenter"},
        {n: "Electrical Systems", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=600", job: "Electrician"},
        {n: "AI Engineering", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=600", job: "AI Specialist"},
        {n: "Cyber Security", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=600", job: "Security Officer"},
        {n: "Auto Mechanics", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=600", job: "Automotive Tech"},
        {n: "UI/UX Design", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=600", job: "Product Designer"},
        {n: "Solar Tech", img: "https://images.unsplash.com/photo-1509391366360-fe5bb58583bb?w=600", job: "Solar Installer"},
        {n: "Web Systems", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600", job: "Full-Stack Dev"},
        {n: "Network Admin", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600", job: "Network Engineer"},
        {n: "Masonry Tech", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=600", job: "Master Mason"},
        {n: "Welding & Metal", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=600", job: "Metal Expert"},
        {n: "Cloud Architect", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=600", job: "Cloud Engineer"},
        {n: "Data Science", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600", job: "Data Architect"},
        {n: "Mobile Dev", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=600", job: "App Developer"},
        {n: "Plumbing Tech", img: "https://images.unsplash.com/photo-1581244277943-fe4a9c777189?w=600", job: "Plumber"}
    ];

    const dict = {
        en: {w:"National Career Hub", s:"Enter 10-Digit Fayda ID", v:"VERIFY IDENTITY", tr:"15 Career Tracks"},
        am: {w:"ብሄራዊ የሙያ ማዕከል", s:"ባለ 10 አሃዝ የፋይዳ መታወቂያ", v:"አረጋግጥ", tr:"15 የሙያ መስኮች"}
    };

    function setL(lang) {
        const d = dict[lang];
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(lang+'-btn').classList.add('active');
        
        const existingID = localStorage.getItem('faydaID') || '';
        document.getElementById('hero-sec').innerHTML = `
            <h1 style="font-size:2.5rem; margin-bottom:10px;">${d.w}</h1>
            <p style="color:#94a3b8;">${d.s}</p>
            <input type="number" class="id-input" value="${existingID}" placeholder="0000000000"><br>
            <button class="v-btn" onclick="handleVerify()">${d.v}</button>`;
        
        document.getElementById('h-tr').innerText = d.tr;
        renderGrid();
    }

    // THE INVISIBLE PART: Saving memory
    function handleVerify() {
        const id = document.querySelector('.id-input').value;
        if (id.length === 10) {
            localStorage.setItem('faydaID', id);
            alert('Identity Verified Successfully');
        } else {
            alert('Please enter 10 digits');
        }
    }

    function renderGrid() {
        document.getElementById('course-grid').innerHTML = tracks.map((t) => `
            <div class="card">
                <img src="${t.img}" onerror="this.src='https://via.placeholder.com/600x400/1e293b/38bdf8?text=${t.n}'">
                <div class="card-body">
                    <div style="font-weight:700;">${t.n}</div>
                    <div class="job-badge">${t.job}</div>
                </div>
            </div>`).join('');
    }

    setL('en');
</script>
</body>
</html>
