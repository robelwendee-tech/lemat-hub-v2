<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --teal: #00bfa5; --coral: #ff7675; --bg: #05080f; --card: #0f172a; --yellow: #fbbf24; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; }

        /* HEADER & TICKER */
        .ticker { background: var(--yellow); color: black; padding: 10px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 3000; }
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 40px; z-index: 2000; }
        .logo { font-size: 28px; font-weight: 900; color: var(--teal); }
        .logo span { color: #333; font-weight: 400; }
        
        /* REGISTRATION FORM POPUP */
        #reg-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; align-items: center; justify-content: center; }
        .reg-content { background: white; color: #333; padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
        .reg-input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }

        /* GRID & HIRING LIST */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; transition: 0.3s; cursor: pointer; }
        .price-tag { color: var(--yellow); font-weight: bold; font-size: 1.1em; }
        .job-row { background: white; color: #333; margin-bottom: 10px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--teal); }

        /* TRACKER & CERT */
        #tracker-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 50px; text-align: center; }
        .bar { background: #1e293b; height: 15px; border-radius: 10px; width: 80%; margin: 20px auto; overflow: hidden; }
        .fill { background: var(--teal); height: 100%; width: 0%; }
    </style>
</head>
<body>

<div class="ticker">🚀 2026 INDUSTRIAL HUB | 15 RESEARCH TRACKS LIVE | HIGHEST SALARY: 85,000 ETB</div>

<header>
    <div class="logo">ልማት<span>hub</span></div>
    <nav>
        <a href="#" style="color:#333; text-decoration:none; margin:0 15px; font-weight:600;">SERVICES</a>
        <button onclick="openReg('General')" style="background:var(--teal); color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">REGISTER NOW</button>
    </nav>
    <button style="border:1.5px solid var(--coral); color:var(--coral); background:transparent; padding:10px 25px; border-radius:50px; font-weight:700;">CONTACT US</button>
</header>

<div class="container">
    <h2 style="color: var(--teal);">Track Prices & Research (15)</h2>
    <div class="grid" id="course-grid"></div>
</div>

<div class="container" style="background: rgba(0, 191, 165, 0.05);">
    <h2 style="color: var(--yellow);">Employer Hiring Dashboard</h2>
    <div id="hiring-list"></div>
</div>

<div id="reg-modal">
    <div class="reg-content">
        <h2 id="reg-title">Register</h2>
        <input type="text" placeholder="Full Name" class="reg-input">
        <input type="email" placeholder="Email Address" class="reg-input">
        <button onclick="submitReg()" style="background:var(--teal); color:white; border:none; width:100%; padding:15px; border-radius:5px; font-weight:bold; cursor:pointer;">CONFIRM REGISTRATION</button>
        <p onclick="document.getElementById('reg-modal').style.display='none'" style="cursor:pointer; color:red; margin-top:10px;">Cancel</p>
    </div>
</div>

<div id="tracker-overlay">
    <h1 id="active-name" style="margin-top:100px; color:var(--teal);">Researching...</h1>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <p id="status">Syncing with Ethiopia Industry Database...</p>
</div>

<script>
    const tracks = [
        {n: "Python for AI", p: "7,500 ETB", s: "75,000 ETB", e: "Ethio-Tech", img: "https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?w=400"},
        {n: "Solar Energy", p: "4,500 ETB", s: "45,000 ETB", e: "Nile-Power", img: "https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg?w=400"},
        {n: "Cloud Systems", p: "8,500 ETB", s: "85,000 ETB", e: "Abyssinia Cloud", img: "https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg?w=400"},
        {n: "EV Engineering", p: "6,500 ETB", s: "65,000 ETB", e: "Eco-Drive", img: "https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg?w=400"},
        {n: "Data Science", p: "8,000 ETB", s: "80,000 ETB", e: "Insight-Africa", img: "https://images.pexels.com/photos/265087/pexels-photo-265087.jpeg?w=400"}
    ];

    function render() {
        document.getElementById('course-grid').innerHTML = tracks.map(t => `
            <div class="card" onclick="startResearch('${t.n}')">
                <img src="${t.img}">
                <div style="padding:15px;">
                    <strong>${t.n}</strong><br>
                    <span class="price-tag">Reg: ${t.p}</span>
                </div>
            </div>`).join('');

        document.getElementById('hiring-list').innerHTML = tracks.map(t => `
            <div class="job-row">
                <div><strong>${t.e}</strong><br><small>${t.n}</small></div>
                <div style="text-align:right">
                    <div style="font-weight:bold; color:var(--teal);">${t.s} / month</div>
                    <button onclick="openReg('${t.n}')" style="background:var(--coral); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Register</button>
                </div>
            </div>`).join('');
    }

    function openReg(course) {
        document.getElementById('reg-title').innerText = "Register for " + course;
        document.getElementById('reg-modal').style.display = 'flex';
    }

    function submitReg() {
        alert("Registration Successful! Redirecting to Payment...");
        document.getElementById('reg-modal').style.display = 'none';
    }

    function startResearch(name) {
        document.getElementById('active-name').innerText = name;
        document.getElementById('tracker-overlay').style.display = 'block';
        let w = 0; let b = document.getElementById('fill');
        let t = setInterval(() => { if(w >= 100) { clearInterval(t); alert('Research Complete! Certificate Generated.'); location.reload(); } else { w++; b.style.width = w + '%'; } }, 30);
    }

    render();
</script>
</body>
</html>
