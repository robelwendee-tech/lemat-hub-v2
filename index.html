<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .ticker { background: var(--yellow); color: black; padding: 12px; text-align: center; font-weight: 800; font-size: 13px; position: sticky; top: 0; z-index: 1000; }

        /* RECEPTION NAV */
        .reception-nav { background: #1e293b; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); }
        .btn-reg { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* REGISTRATION FORM */
        #registration-section { display: none; background: white; color: black; padding: 40px; border-radius: 15px; max-width: 500px; margin: 40px auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }

        /* 15 TRACK GRID */
        .section-padding { padding: 40px 5%; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .card img { width: 100%; height: 160px; object-fit: cover; }

        /* JOB BOARD */
        .job-card { background: var(--card); border: 2px solid var(--yellow); padding: 25px; border-radius: 15px; }
        .salary { color: var(--green); font-size: 24px; font-weight: 900; margin: 10px 0; display: block; }

        /* RECEPTION CHAT BOX */
        #reception-chat { display: none; position: fixed; bottom: 20px; right: 20px; width: 320px; background: white; color: black; border-radius: 10px; z-index: 5000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="ticker">🛎️ RECEPTION ACTIVE | REGISTER NOW TO LOCK IN YOUR 2026 SALARY</div>

<nav class="reception-nav">
    <div style="font-weight: 900; font-size: 20px; color: var(--accent);">ልማት Hub</div>
    <div>
        <button class="btn-reg" onclick="showReg()">CLIENT REGISTRATION</button>
        <button onclick="toggleChat()" style="background:var(--yellow); border:none; padding:10px; border-radius:5px; margin-left:10px; cursor:pointer;">RECEPTION</button>
    </div>
</nav>

<div id="main-dashboard">
    <div id="registration-section">
        <h2 style="margin-top:0;">Client Registration</h2>
        <p style="font-size:13px; color:#666;">Enter your details to access the 2026 job board.</p>
        <input type="text" placeholder="Full Name (per Fayda ID)">
        <input type="email" placeholder="Email Address">
        <select>
            <option>Select Your Track</option>
            <option>AI Developer</option>
            <option>Cloud Architect</option>
            <option>Master Carpenter</option>
        </select>
        <button onclick="submitReg()" style="width:100%; background:var(--green); color:white; border:none; padding:15px; border-radius:5px; font-weight:bold; cursor:pointer;">COMPLETE REGISTRATION</button>
        <button onclick="hideReg()" style="width:100%; background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>

    <div class="section-padding">
        <h2 style="color:var(--accent);">Professional Certification Tracks</h2>
        <div class="track-grid" id="track-grid"></div>
    </div>

    <div class="section-padding" style="background: rgba(56, 189, 248, 0.03);">
        <h2>Available Positions & Salaries</h2>
        <div class="track-grid" id="job-list"></div>
    </div>
</div>

<div id="reception-chat">
    <div style="background:var(--card); color:white; padding:15px; border-radius:10px 10px 0 0;">Receptionist Online</div>
    <div id="chat-box" style="padding:20px; height:200px; overflow-y:auto; font-size:14px;">
        Welcome! Please register using the green button to start your career.
    </div>
    <div style="border-top:1px solid #ddd; display:flex;">
        <input type="text" id="chat-in" placeholder="Ask a question..." style="border:none; margin:0; border-radius:0;">
        <button onclick="sendChat()" style="background:var(--accent); border:none; padding:10px;">Send</button>
    </div>
</div>

<script>
    const tracks = [
        {id: 1, n: "Python for AI", g: "AI Developer", price: "75,000 ETB", img: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=500"},
        {id: 4, n: "Cloud Architecture", g: "Cloud Architect", price: "85,000 ETB", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500"},
        {id: 15, n: "Plumbing Tech", g: "Hydraulics Lead", price: "29,000 ETB", img: "https://images.unsplash.com/photo-1585704032915-c3400ca1f963?w=500"}
        // ... (12 more tracks)
    ];

    function render() {
        document.getElementById('track-grid').innerHTML = tracks.map(t => `
            <div class="card">
                <img src="${t.img}">
                <div style="padding:15px;"><strong>${t.n}</strong></div>
            </div>`).join('');

        document.getElementById('job-list').innerHTML = tracks.map(t => `
            <div class="job-card">
                <h3 style="margin:0;">${t.g}</h3>
                <span class="salary">${t.price}</span>
                <button onclick="showReg()" style="width:100%; background:var(--accent); border:none; padding:12px; border-radius:5px; font-weight:bold; cursor:pointer;">APPLY NOW</button>
            </div>`).join('');
    }

    function showReg() { document.getElementById('registration-section').style.display = 'block'; window.scrollTo(0,0); }
    function hideReg() { document.getElementById('registration-section').style.display = 'none'; }
    function toggleChat() { 
        const c = document.getElementById('reception-chat');
        c.style.display = c.style.display === 'block' ? 'none' : 'block';
    }
    function submitReg() { alert("Registration Complete! Welcome to ልማት Hub."); hideReg(); }
    function sendChat() {
        const i = document.getElementById('chat-in');
        document.getElementById('chat-box').innerHTML += `<p><strong>You:</strong> ${i.value}</p>`;
        i.value = '';
    }

    render();
</script>
</body>
</html>
