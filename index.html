<style>
    /* CERTIFICATE MODAL */
    #cert-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 7000; justify-content: center; align-items: center; }
    .cert-paper { background: #fff; color: #1e293b; width: 600px; padding: 40px; border: 15px double var(--yellow); text-align: center; font-family: 'Georgia', serif; position: relative; }
    .cert-paper h1 { font-size: 40px; margin: 0; color: var(--card); }
    .cert-name { font-size: 30px; color: var(--accent); border-bottom: 2px solid #ddd; display: inline-block; padding: 0 20px; margin: 20px 0; }
</style>

<div id="study-room">
    <div class="tracker-ui">
        <h3>📊 Live Research Tracker</h3>
        <p id="study-research"></p>
        <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        <button id="complete-btn" onclick="generateCert()" style="display:none; background:var(--green); color:white; padding:15px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; width:100%;">CLAIM COMPLETION CERTIFICATE</button>
    </div>
</div>

<div id="cert-modal">
    <div class="cert-paper">
        <p>OFFICIAL INDUSTRIAL RESEARCH RECORD</p>
        <h1>CERTIFICATE</h1>
        <p>This certifies that</p>
        <div class="cert-name" id="c-user">Student Name</div>
        <p>has successfully completed the research phase for</p>
        <h3 id="c-track" style="color:var(--card);">Track Name</h3>
        <p>Awarded in the year 2026</p>
        <button onclick="closeModal('cert-modal')" style="margin-top:20px; background:var(--card); color:white; padding:10px 20px; cursor:pointer;">DOWNLOAD & CLOSE</button>
    </div>
</div>

<script>
    // Update your openStudy function to include the progress logic
    function openStudy(idx) {
        const item = tracks[idx];
        document.getElementById('study-title').innerText = item.n;
        document.getElementById('study-research').innerText = item.r;
        document.getElementById('study-room').style.display = 'block';
        
        // Simulate a "loading" progress for research
        let width = 0;
        const fill = document.getElementById('p-fill');
        const btn = document.getElementById('complete-btn');
        btn.style.display = 'none';
        
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                btn.style.display = 'block'; // Show certificate button when done
            } else {
                width++;
                fill.style.width = width + '%';
            }
        }, 30);
    }

    function generateCert() {
        document.getElementById('c-user').innerText = currentUser; // Uses name from Registration
        document.getElementById('c-track').innerText = document.getElementById('study-title').innerText;
        openModal('cert-modal');
    }
</script>
