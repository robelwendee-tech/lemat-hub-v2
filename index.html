<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --dark: #070b14; --accent: #38bdf8; --success: #10b981; --yellow: #fbbf24; --card: #111827; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--dark); color: white; overflow-x: hidden; }
        
        /* Header & Navigation */
        header { background: rgba(7, 11, 20, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); text-decoration: none; }

        /* Announcement Ticker */
        .ticker { background: var(--yellow); color: #000; padding: 10px; font-weight: 700; overflow: hidden; white-space: nowrap; }
        .ticker-text { display: inline-block; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* Grid Layout */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* Card Styling */
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: cover; background: #1e293b; }
        .card-body { padding: 20px; }
        
        .status-badge { display: inline-block; margin-top: 10px; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; background: #374151; }
        .enrolled { background: var(--success); color: white; }

        /* Syllabus Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); max-width: 450px; width: 100%; }
        .modal-btn { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

<header><a href="#" class="logo">ልማት Hub</a></header>
<div class="ticker"><div class="ticker-text">Digital Ethiopia 2026 | 15 Certified Career Tracks | Progress Tracked via Fayda ID</div></div>

<div class="container">
    <h1 style="margin-bottom: 30px;">Your Professional Tracks</h1>
    <div class="grid" id="course-grid"></div>
</div>

<div id="syllabus-modal" class="modal">
    <div class="modal-box">
        <h2 id="m-title" style="color:var(--accent); margin-bottom:15px;"></h2>
        <p style="opacity: 0.7; margin-bottom: 10px;">Course Syllabus:</p>
        <ul id="m-list" style="list-style: none; line-height: 2;"></ul>
        <button id="enroll-btn" class="modal-btn" onclick="processEnroll()">START TRACK</button>
        <button class="modal-btn" style="background: #374151; color: white; margin-top: 10px;" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<script>
    // FULL LIST RESTORED
    const tracks = [
        {id: 1, n: "Modern Carpentry", job: "Master Carpenter", lessons: ["Woodworking Fundamentals", "Power Tool Safety", "Furniture Design"]},
        {id: 2, n: "Electrical Systems", job: "Electrician", lessons: ["Circuitry Basics", "Home Wiring", "Safety Standards"]},
        {id: 3, n: "AI Engineering", job: "AI Specialist", lessons: ["Python for AI", "Machine Learning", "Neural Networks"]},
        {id: 4, n: "Cyber Security", job: "Security Officer", lessons: ["Network Defense", "Encryption", "Ethical Hacking"]},
        {id: 5, n: "Auto Mechanics", job: "Automotive Tech", lessons: ["Engine Diagnostics", "Braking Systems", "Hybrid Tech"]},
        {id: 6, n: "UI/UX Design", job: "Product Designer", lessons: ["User Research", "Figma Mastery", "Prototyping"]},
        {id: 7, n: "Solar Tech", job: "Solar Installer", lessons: ["Photovoltaics", "Grid Connection", "Battery Storage"]},
        {id: 8, n: "Web Systems", job: "Full-Stack Dev", lessons: ["HTML/CSS/JS", "Node.js", "Database Management"]}
    ];

    let currentTrackId = null;

    function renderGrid() {
        const enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        document.getElementById('course-grid').innerHTML = tracks.map(t => {
            const isEnrolled = enrolled.includes(t.id);
            return `
                <div class="card" onclick="openSyllabus(${t.id})">
                    <img src="https://via.placeholder.com/400x200/1e293b/38bdf8?text=${t.n}" alt="${t.n}">
                    <div class="card-body">
                        <h3>${t.n}</h3>
                        <p style="font-size: 0.8rem; opacity: 0.6;">Goal: ${t.job}</p>
                        <div class="status-badge ${isEnrolled ? 'enrolled' : ''}">
                            ${isEnrolled ? '✓ ENROLLED' : 'VIEW SYLLABUS'}
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function openSyllabus(id) {
        const track = tracks.find(t => t.id === id);
        currentTrackId = id;
        document.getElementById('m-title').innerText = track.n;
        document.getElementById('m-list').innerHTML = track.lessons.map(l => `<li>▹ ${l}</li>`).join('');
        
        const enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        const btn = document.getElementById('enroll-btn');
        btn.innerText = enrolled.includes(id) ? "CONTINUE TRACK" : "ENROLL NOW";
        btn.style.background = enrolled.includes(id) ? "#10b981" : "#38bdf8";

        document.getElementById('syllabus-modal').style.display = 'flex';
    }

    function processEnroll() {
        let enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        if(!enrolled.includes(currentTrackId)) {
            enrolled.push(currentTrackId);
            localStorage.setItem('enrolled', JSON.stringify(enrolled)); // PERSISTENCE LOGIC
        }
        closeModal();
        renderGrid();
    }

    function closeModal() { document.getElementById('syllabus-modal').style.display = 'none'; }

    renderGrid();
</script>
</body>
</html>
