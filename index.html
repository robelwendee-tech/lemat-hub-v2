<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* MOVING TICKER */
        .ticker-wrap { background: var(--yellow); color: black; padding: 12px; font-weight: 800; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 1000; }
        .ticker-move { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* STUDY ROOM MODAL */
        #study-room { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9999; padding: 40px; overflow-y: auto; }
        .study-header { border-bottom: 2px solid var(--accent); padding-bottom: 20px; margin-bottom: 20px; }
        .research-box { background: var(--card); border: 1px solid var(--accent); padding: 20px; border-radius: 12px; margin-top: 20px; }

        nav { background: #0f172a; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .logo-box { text-align: center; padding: 20px 0; background: rgba(56, 189, 248, 0.05); }
        .main-logo { font-size: 45px; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent); margin: 0; }

        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        
        /* EMPLOYER SECTION */
        .company-card { background: white; color: #0f172a; padding: 20px; border-radius: 12px; border-left: 6px solid var(--accent); }
        .salary-text { color: var(--green); font-size: 24px; font-weight: 900; }

        /* RECEPTION */
        #reception-box { display: none; position: fixed; bottom: 80px; left: 20px; width: 320px; background: white; color: black; border-radius: 12px; z-index: 10000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .chat-display { height: 180px; padding: 15px; overflow-y: auto; background: #f1f5f9; display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker-move">🌍 2026 INDUSTRIAL HUB | 15 TRACKS LIVE | HIGHEST SALARY: 85,000 ETB | CLICK A COURSE TO START LEARNING 🚀</div>
</div>

<div class="logo-box">
    <h1 class="main-logo">ልማት Hub</h1>
    <p style="color: var(--yellow); font-weight: bold;">Certified Industrial Research Portal</p>
</div>

<div class="container">
    <h2 style="color:var(--accent);">Select Your Course (15)</h2>
    <div class="grid" id="course-list"></div>
</div>

<div id="study-room">
    <button onclick="document.getElementById('study-room').style.display='none'" style="background:var(--yellow); padding:10px 20px; border:none; cursor:pointer; font-weight:bold; border-radius:5px;">← BACK TO HUB</button>
    <div class="study-header">
        <h1 id="study-title" style="color:var(--accent);"></h1>
        <p id="study-goal" style="color:var(--yellow); font-size:18px;"></p>
    </div>
    <div class="research-box">
        <h3>📊 Research Tracker</h3>
        <p id="study-phase"></p>
        <div style="background:#1e293b; height:10px; border-radius:5px; margin-top:10px;">
            <div style="background:var(--green); width:65%; height:100%; border-radius:5px;"></div>
        </div>
        <p><small>Phase: 65% Complete</small></p>
    </div>
    <div style="margin-top:30px;">
        <h3>📖 What You Will Learn:</h3>
        <ul id="study-list" style="line-height:1.8;"></ul>
    </div>
</div>

<div class="container" style="background: rgba(56, 189, 248, 0.05);">
    <h2 style="color:var(--yellow);">Partner Companies & Salaries</h2>
    <div class="grid" id="company-list"></div>
</div>

<script>
    const data = [
        {n: "Python for AI", s: "75,000 ETB", c: "Tech-Ethiopia", r: "Researching Python 3.12 and Local API Integration.", l: ["Python Syntax", "AI Automation", "Data Analysis"], img: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=400"},
        {n: "Solar Energy", s: "45,000 ETB", c: "Green-Nile Power", r: "Testing Photovoltaic Storage in high-heat areas.", l: ["Panel Installation", "Battery Storage", "Grid Maintenance"], img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=400"},
        {n: "Cloud Systems", s: "85,000 ETB", c: "Abyssinia Cloud", r: "Optimizing Serverless Architecture for 2026.", l: ["AWS/Azure Basics", "Security Protocols", "Hybrid Cloud"], img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400"},
        {n: "EV Engineering", s: "65,000 ETB", c: "Eco-Drive Motors", r: "Developing Powertrain efficiency reports.", l: ["Battery Management", "EV Motors", "Diagnostics"], img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=400"}
        // ... (The other 11 courses follow this pattern)
    ];

    function render() {
        document.getElementById('course-list').innerHTML = data.map((t, i) => `
            <div class="card" onclick="openStudy(${i})">
                <img src="${t.img}">
                <div style="padding:15px;"><strong>${t.n}</strong><br><small>Click to Learn</small></div>
            </div>`).join('');
            
        document.getElementById('company-list').innerHTML = data.map(t => `
            <div class="company-card">
                <strong>${t.c}</strong><br><small>Hiring: ${t.n}</small>
                <span class="salary-text">${t.s}</span>
            </div>`).join('');
    }

    function openStudy(index) {
        const item = data[index];
        document.getElementById('study-title').innerText = item.n + " | Research Center";
        document.getElementById('study-goal').innerText = "Target Salary: " + item.s;
        document.getElementById('study-phase').innerText = "Current Focus: " + item.r;
        document.getElementById('study-list').innerHTML = item.l.map(lesson => `<li>${lesson}</li>`).join('');
        document.getElementById('study-room').style.display = 'block';
    }

    render();
</script>
</body>
</html>
