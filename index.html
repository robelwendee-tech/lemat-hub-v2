<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Master 2026</title>
    <style>
        :root { --teal: #00bfa5; --coral: #ff7675; --bg: #05080f; --card: #0f172a; --yellow: #fbbf24; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }

        /* TICKER */
        .ticker { background: var(--yellow); color: black; padding: 10px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 3000; }

        /* MOBITOUCH HEADER */
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 40px; z-index: 2000; }
        .logo { font-size: 28px; font-weight: 900; color: var(--teal); }
        .logo span { color: #333; font-weight: 400; }
        nav a { text-decoration: none; color: #333; font-weight: 600; margin: 0 15px; }
        .contact-btn { border: 2px solid var(--coral); color: var(--coral); background: transparent; padding: 10px 25px; border-radius: 50px; font-weight: 700; cursor: pointer; }

        /* COURSE GRID */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--teal); transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: cover; }

        /* HIRING ROWS */
        .job-row { background: white; color: #333; margin-bottom: 10px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--teal); }

        /* AI BOX */
        #ai-box { position: fixed; bottom: 80px; right: 20px; width: 300px; background: #0f172a; border-radius: 10px; border: 1px solid var(--teal); display: none; z-index: 4000; overflow: hidden; }
        .chat-area { height: 200px; padding: 15px; overflow-y: auto; font-size: 14px; background: #1e293b; }

        /* TRACKER OVERLAY */
        #tracker-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 50px; text-align: center; }
        .bar-bg { background: #1e293b; height: 15px; border-radius: 10px; margin: 30px auto; width: 80%; overflow: hidden; }
        .bar-fill { background: var(--teal); height: 100%; width: 0%; transition: 0.1s; }
    </style>
</head>
<body>

<div class="ticker">🚀 2026 INDUSTRIAL HUB | 15 RESEARCH TRACKS LIVE | HIGHEST SALARY: 85,000 ETB</div>

<header>
    <div class="logo">ልማት<span>hub</span></div>
    <nav>
        <a href="#">ABOUT US</a>
        <a href="#" style="color:var(--teal); border-bottom:2px solid var(--teal);">RESEARCH</a>
        <a href="#">HIRE</a>
    </nav>
    <button class="contact-btn" onclick="alert('Contact Form Ready!')">CONTACT US</button>
</header>

<div class="container">
    <h2 style="color: var(--teal);">Select Your Course (15)</h2>
    <div class="grid" id="course-grid"></div>
</div>

<div class="container" style="background: rgba(0, 191, 165, 0.05);">
    <h2 style="color: var(--yellow);">Employer Hiring Dashboard</h2>
    <div id="hiring-list"></div>
</div>

<div id="tracker-overlay">
    <button onclick="document.getElementById('tracker-overlay').style.display='none'" style="background:var(--coral); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; float:left;">← EXIT</button>
    <h1 id="track-name" style="margin-top:100px; color:var(--teal);">Research Tracker</h1>
    <div class="bar-bg"><div class="bar-fill" id="fill"></div></div>
    <p>Status: Analyzing Industrial Data...</p>
</div>

<div id="ai-box">
    <div style="background:var(--teal); padding:10px; font-weight:bold;">AI Assistant</div>
    <div id="ai-chat" class="chat-area">AI: Hello! Ask me about job prices and hiring.</div>
    <div style="padding:10px; display:flex;">
        <input type="text" id="ai-q" style="flex:1; padding:5px; border-radius:3px;">
        <button onclick="askAI()" style="background:var(--teal); border:none; color:white; margin-left:5px; padding:5px 10px; border-radius:3px;">Send</button>
    </div>
</div>

<button onclick="toggleAI()" style="position:fixed; bottom:20px; right:20px; background:var(--teal); color:white; border:none; width:60px; height:60px; border-radius:50%; font-size:24px; cursor:pointer; font-weight:bold;">AI</button>

<script>
    const tracks = [
        {n: "Python for AI", s: "75,000 ETB", e: "Ethio-Tech", img: "https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?w=400"},
        {n: "Solar Energy", s: "45,000 ETB", e: "Nile-Power", img: "https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg?w=400"},
        {n: "Cloud Systems", s: "85,000 ETB", e: "Abyssinia Cloud", img: "https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg?w=400"},
        {n: "EV Engineering", s: "65,000 ETB", e: "Eco-Drive", img: "https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg?w=400"},
        {n: "Data Science", s: "80,000 ETB", e: "Insight-Africa", img: "https://images.pexels.com/photos/265087/pexels-photo-265087.jpeg?w=400"}
    ];

    function render() {
        document.getElementById('course-grid').innerHTML = tracks.map(t => `
            <div class="card" onclick="startResearch('${t.n}')">
                <img src="${t.img}">
                <div style="padding:15px;"><strong>${t.n}</strong></div>
            </div>`).join('');
            
        document.getElementById('hiring-list').innerHTML = tracks.map(t => `
            <div class="job-row">
                <div><strong>${t.e}</strong><br><small>${t.n}</small></div>
                <div style="font-weight:bold; color:var(--teal);">${t.s}</div>
                <button style="background:var(--coral); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="alert('Applying...')">Apply</button>
            </div>`).join('');
    }

    function startResearch(name) {
        document.getElementById('track-name').innerText = name;
        document.getElementById('tracker-overlay').style.display = 'block';
        let w = 0; let b = document.getElementById('fill');
        let t = setInterval(() => { if(w >= 100) clearInterval(t); else { w++; b.style.width = w + '%'; } }, 30);
    }

    function toggleAI() {
        let box = document.getElementById('ai-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function askAI() {
        let q = document.getElementById('ai-q').value;
        if(q) {
            document.getElementById('ai-chat').innerHTML += `<div><b>You:</b> ${q}</div>`;
            document.getElementById('ai-q').value = "";
            setTimeout(() => { document.getElementById('ai-chat').innerHTML += `<div style="color:var(--teal);"><b>AI:</b> Cloud Systems pays 85,000 ETB!</div>`; }, 600);
        }
    }
    render();
</script>
</body>
</html>
