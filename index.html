<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        .ticker { background: var(--yellow); color: black; padding: 12px; text-align: center; font-weight: 800; font-size: 13px; position: sticky; top: 0; z-index: 1000; }

        /* COURSE GRID CONFIGURATION */
        .section-padding { padding: 40px 5%; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(56,189,248,0.2); }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #000; }
        .card-content { padding: 20px; }
        .card-content strong { display: block; font-size: 18px; margin-bottom: 5px; }
        .card-content span { color: var(--accent); font-size: 12px; font-weight: bold; }

        /* JOB BOARD */
        .job-card { background: var(--card); border: 2px solid var(--yellow); padding: 25px; border-radius: 15px; }
        .salary { color: var(--green); font-size: 26px; font-weight: 900; margin: 10px 0; display: block; }

        /* LEARNING VIEW */
        #learning-view { display: none; height: 100vh; grid-template-columns: 1fr 380px; position: fixed; top: 0; left: 0; width: 100%; background: var(--bg); z-index: 2000; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--accent); border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .video-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="ticker">🚀 15 CERTIFIED TRACKS LOADED | FAYDA ID VERIFICATION REQUIRED | CONTACT: ROBELWENDEE@GMAIL.COM</div>

<div id="dashboard">
    <div class="section-padding">
        <h2 style="color:var(--accent); margin-bottom:30px;">Professional Certification Tracks</h2>
        <div class="track-grid" id="track-grid"></div>
    </div>

    <div class="section-padding" style="background: rgba(56, 189, 248, 0.03);">
        <h2 style="margin-bottom:30px;">Hiring Now: 2026 Salary Guide</h2>
        <div class="track-grid" id="job-list"></div>
    </div>
</div>

<div id="learning-view">
    <div style="padding: 30px; overflow-y: auto;">
        <button onclick="closeL()" style="background:var(--yellow); border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:25px;">← RETURN TO DASHBOARD</button>
        <h2 id="view-title" style="color:var(--accent);">Course Title</h2>
        <div class="video-box" id="lesson-img-large"></div>
        <div style="background:rgba(255,255,255,0.02); padding:30px; border-radius:15px; border:1px solid rgba(255,255,255,0.1);">
            <h3 id="salary-highlight" style="color:var(--green); margin-top:0;"></h3>
            <p id="writing-body" style="line-height:1.8; color:#cbd5e1; font-size:16px;"></p>
        </div>
    </div>
    <div style="background:var(--card); padding:25px; border-left:1px solid #1e293b;">
        <h3>Technical Progress</h3>
        <div style="padding:20px; background:rgba(56,189,248,0.1); border-radius:12px; border:1px solid var(--accent);">
            <strong style="color:var(--accent);">Module 1: Industrial Standards</strong>
            <p style="font-size:13px; margin-top:10px;">Status: In Progress</p>
        </div>
    </div>
</div>

<script>
    // Configured Images for all courses
    const tracks = [
        {id: 1, n: "Python for AI", g: "AI Developer", price: "75,000 ETB", img: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=800", w: "Master Python logic and connect to the Ethiopian Digital Gateway using REST APIs."},
        {id: 2, n: "Cyber Security", g: "Security Analyst", price: "60,000 ETB", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800", w: "Audit network traffic and implement high-level encryption for local servers."},
        {id: 3, n: "Full-Stack Web", g: "Web Developer", price: "55,000 ETB", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800", w: "Build modern web applications using React and high-speed SQL databases."},
        {id: 4, n: "Cloud Architecture", g: "Cloud Architect", price: "85,000 ETB", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800", w: "Architect secure virtual clouds for government digital ID services."},
        {id: 5, n: "Mobile App Dev", g: "Mobile Engineer", price: "50,000 ETB", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=800", w: "Develop cross-platform mobile apps for Android and iOS using Flutter."},
        {id: 6, n: "Modern Carpentry", g: "Master Carpenter", price: "35,000 ETB", img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=800", w: "Analyze blueprints and use industrial power tools for export-quality finishing."},
        {id: 7, n: "Electrical Systems", g: "Grid Specialist", price: "32,000 ETB", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=800", w: "Install 3-phase power grids and calculate industrial electrical loads."},
        {id: 8, n: "Solar Tech", g: "Solar Installer", price: "38,000 ETB", img: "https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?w=800", w: "Set up PV panel arrays and configure smart hybrid inverter systems."},
        {id: 9, n: "UI/UX Design", g: "Product Designer", price: "45,000 ETB", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=800", w: "Create design systems in Figma that prioritize accessibility and local UX."},
        {id: 10, n: "Data Science", g: "Data Analyst", price: "62,000 ETB", img: "https://images.unsplash.com/photo-1551288049-bbbda536339a?w=800", w: "Visualize economic trends and build predictive models for government data."},
        {id: 11, n: "Auto Mechanics", g: "EV Technician", price: "30,000 ETB", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=800", w: "Diagnose electric vehicle drivetrains using digital ECU scanning tools."},
        {id: 12, n: "Masonry Tech", g: "Senior Mason", price: "28,000 ETB", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=800", w: "Lead structural layouts using reinforced concrete and modern masonry methods."},
        {id: 13, n: "Welding Tech", g: "Certified Welder", price: "33,000 ETB", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=800", w: "Perform precision TIG/MIG welding on critical infrastructure framework."},
        {id: 14, n: "Network Admin", g: "Network Engineer", price: "42,000 ETB", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=800", w: "Configure fiber-optic networks and manage enterprise-level server security."},
        {id: 15, n: "Plumbing Tech", g: "Hydraulics Lead", price: "29,000 ETB", img: "https://images.unsplash.com/photo-1585704032915-c3400ca1f963?w=800", w: "Design high-pressure hydraulics for luxury residential waste systems."}
    ];

    function render() {
        // Render 15 Courses
        document.getElementById('track-grid').innerHTML = tracks.map(t => `
            <div class="card" onclick="openL(${t.id})">
                <img src="${t.img}" alt="${t.n}">
                <div class="card-content">
                    <span>GOAL: ${t.g}</span>
                    <strong>${t.n}</strong>
                    <div style="color:var(--accent); font-size:12px; margin-top:10px;">5 LESSONS AVAILABLE →</div>
                </div>
            </div>`).join('');

        // Render Job Board
        document.getElementById('job-list').innerHTML = tracks.map(t => `
            <div class="job-card">
                <h3 style="margin:0;">${t.g}</h3>
                <span class="salary">${t.price}<small style="font-size:12px; color:white; font-weight:normal;">/mo</small></span>
                <p style="font-size:12px; margin-bottom:20px;">Requires: ${t.n} Certification</p>
                <button onclick="openL(${t.id})" style="width:100%; background:var(--accent); border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:10px;">START TRAINING</button>
                <button onclick="alert('Contacting Robel at robelwendee@gmail.com...')" style="width:100%; background:transparent; border:1px solid white; color:white; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">CONTACT US</button>
            </div>`).join('');
    }

    function openL(id) {
        const t = tracks.find(x => x.id === id);
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('learning-view').style.display = 'grid';
        document.getElementById('view-title').innerText = t.n;
        document.getElementById('salary-highlight').innerText = "Target Salary: " + t.price;
        document.getElementById('writing-body').innerText = t.w;
        document.getElementById('lesson-img-large').innerHTML = `<img src="${t.img}" alt="Lesson Detail">`;
    }

    function closeL() {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('learning-view').style.display = 'none';
    }

    render();
</script>
</body>
</html>
