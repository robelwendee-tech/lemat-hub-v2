<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --dark: #070b14; --accent: #38bdf8; --success: #10b981; --yellow: #fbbf24; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--dark); color: white; }
        
        header { background: rgba(7, 11, 20, 0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .yellow-ticker { background: var(--yellow); color: #000; padding: 10px; font-weight: 700; overflow: hidden; white-space: nowrap; }
        .scrolling-text { display: inline-block; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #111827; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 170px; object-fit: cover; background: #1e293b; }
        .card-body { padding: 20px; }

        .status-badge { display: inline-block; margin-top: 10px; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; background: #374151; }
        .enrolled { background: var(--success); }

        /* Modal for Syllabus */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: #111827; padding: 30px; border-radius: 20px; border: 1px solid var(--accent); max-width: 400px; width: 90%; }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<header><a href="#" style="color:var(--accent); text-decoration:none; font-weight:800; font-size:24px;">ልማት Hub</a></header>
<div class="yellow-ticker"><div class="scrolling-text">15 Career Tracks | Enrollment Active | Progress Saved to Fayda ID</div></div>

<div class="container">
    <h1 style="margin-bottom:20px;">Your Career Paths</h1>
    <div class="grid" id="course-grid"></div>
</div>

<div id="modal">
    <div class="modal-box">
        <h2 id="m-title" style="color:var(--accent);"></h2>
        <ul id="m-list" style="margin: 20px 0; list-style: none; opacity: 0.8;"></ul>
        <button class="btn" id="m-action" onclick="handleEnroll()">ENROLL NOW</button>
        <button class="btn" style="background:#374151; color:white;" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<script>
    const tracks = [
        {id: 1, n: "Modern Carpentry", img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=600", job: "Master Carpenter", lessons: ["Wood Basics", "Safety Tools", "Joining Techniques"]},
        {id: 2, n: "Electrical Systems", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=600", job: "Electrician", lessons: ["Wiring 101", "Circuit Design", "Power Safety"]},
        {id: 3, n: "AI Engineering", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=600", job: "AI Specialist", lessons: ["Python for AI", "Data Models", "Neural Networks"]},
        // Add more tracks here following the same format
    ];

    let selectedId = null;

    function renderGrid() {
        const enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        document.getElementById('course-grid').innerHTML = tracks.map(t => {
            const isEnrolled = enrolled.includes(t.id);
            return `
                <div class="card" onclick="openSyllabus(${t.id})">
                    <img src="${t.img}" onerror="this.src='https://via.placeholder.com/400x200/1e293b/38bdf8?text=${t.n}'">
                    <div class="card-body">
                        <h3>${t.n}</h3>
                        <p style="font-size:0.8rem; opacity:0.6;">${t.job}</p>
                        <div class="status-badge ${isEnrolled ? 'enrolled' : ''}">
                            ${isEnrolled ? '✓ ENROLLED' : 'VIEW SYLLABUS'}
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function openSyllabus(id) {
        const track = tracks.find(t => t.id === id);
        selectedId = id;
        document.getElementById('m-title').innerText = track.n;
        document.getElementById('m-list').innerHTML = track.lessons.map(l => `<li>• ${l}</li>`).join('');
        
        const enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        const btn = document.getElementById('m-action');
        if(enrolled.includes(id)) {
            btn.innerText = "CONTINUE LESSONS";
            btn.style.background = "#10b981";
        } else {
            btn.innerText = "ENROLL NOW";
            btn.style.background = "#38bdf8";
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function handleEnroll() {
        let enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        if(!enrolled.includes(selectedId)) {
            enrolled.push(selectedId);
            localStorage.setItem('enrolled', JSON.stringify(enrolled)); // Invisible memory
        }
        closeModal();
        renderGrid();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    renderGrid();
</script>
</body>
</html>
