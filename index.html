<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Career 2026</title>
    <style>
        :root { --dark: #0f172a; --accent: #38bdf8; --yellow: #FFD700; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #f8fafc; line-height: 1.6; overflow-x: hidden; }
        
        /* HEADER & TICKER */
        header { background: rgba(15, 23, 42, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent); text-decoration: none; }
        .l-btn { padding: 6px 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; border-radius: 8px; font-weight: bold; margin-left: 5px; }
        .l-btn.active { background: var(--accent); color: var(--dark); }
        .yellow-tracker { background: var(--yellow); color: #000; padding: 10px; font-weight: 800; overflow: hidden; white-space: nowrap; }
        .scrolling-text { display: inline-block; animation: scroll 35s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* GRID & CARDS */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section-h { font-size: 1.8rem; margin: 40px 0 20px; border-left: 8px solid var(--yellow); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .card { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 160px; object-fit: cover; background: #000; }
        .card-body { padding: 15px; }
        .tech-stack { font-size: 0.8rem; color: var(--accent); margin: 5px 0; font-weight: 600; }
        .career-tag { font-size: 0.7rem; background: rgba(56, 189, 248, 0.1); padding: 4px 10px; border-radius: 8px; color: #fff; border: 1px solid rgba(56,189,248,0.3); }

        /* MODAL POPUP */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: #1e293b; padding: 30px; border-radius: 25px; max-width: 500px; width: 90%; border: 2px solid var(--accent); position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #94a3b8; }
        .progress-bar { width: 100%; height: 8px; background: #0f172a; border-radius: 10px; margin: 10px 0 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 1s; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ልማት Hub</a>
    <div>
        <button class="l-btn active" onclick="setL('en')" id="en-btn">EN</button>
        <button class="l-btn" onclick="setL('am')" id="am-btn">አማር</button>
    </div>
</header>

<div class="yellow-tracker">
    <div class="scrolling-text" id="ticker-msg">15 Career Tracks Active | Certified by Digital Ethiopia 2026 | Developed by Robel</div>
</div>

<div class="container">
    <h2 class="section-h" id="h-tr">Career Tracks</h2>
    <div class="grid" id="course-grid"></div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">×</span>
        <h2 id="m-title" style="color:var(--accent); margin-bottom:10px;">Course Detail</h2>
        <div id="m-content"></div>
        <button style="background:var(--yellow); color:#000; width:100%; padding:12px; border:none; border-radius:10px; font-weight:900; margin-top:20px; cursor:pointer;">ENROLL NOW</button>
    </div>
</div>

<footer style="text-align:center; padding:40px; color:#475569;">© 2026 ልማት Hub | Developed by Robel</footer>

<script>
    const tracks = [
        {n: "Modern Carpentry", img: "https://images.unsplash.com/photo-1621290621119-7d1c103bc3f1?w=500", tech: "Woodwork, Design", job: "Master Carpenter", syl: ["Power Tools", "Safety", "Design"]},
        {n: "Electrical Systems", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=500", tech: "Solar, Wiring", job: "Electrician", syl: ["Circuitry", "Solar Install", "Safety"]},
        {n: "AI Engineering", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=500", tech: "Python, ML", job: "AI Specialist", syl: ["Models", "Data Science", "Python"]},
        {n: "Cyber Security", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500", tech: "Defense, Hacking", job: "Security Officer", syl: ["Network", "Security", "Ethics"]},
        {n: "Auto Mechanics", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500", tech: "EV Diagnostics", job: "Technician", syl: ["Engines", "EV Systems", "Repair"]},
        {n: "Plumbing Tech", img: "https://images.unsplash.com/photo-1581244277943-fe4a9c777189?w=500", tech: "Modern Piping", job: "Plumber", syl: ["Water", "Maintenance", "Fabrication"]},
        {n: "Web Systems", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500", tech: "React, Node.js", job: "Full-Stack Dev", syl: ["Frontend", "Backend", "Database"]},
        {n: "Data Science", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500", tech: "SQL, Analysis", job: "Data Architect", syl: ["SQL", "Analytics", "Big Data"]},
        {n: "Welding & Metal", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=500", tech: "MIG Fabrication", job: "Metal Expert", syl: ["Welding", "Blueprints", "Safety"]},
        {n: "UI/UX Design", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=500", tech: "Figma, Research", job: "Designer", syl: ["Figma", "UX Flow", "Research"]},
        {n: "Solar Tech", img: "https://images.unsplash.com/photo-1509391366360-fe5bb58583bb?w=500", tech: "PV Panels, Battery", job: "Solar Installer", syl: ["Panels", "Energy", "Storage"]},
        {n: "Mobile Dev", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=500", tech: "Flutter, Firebase", job: "App Developer", syl: ["Dart", "UI Kit", "Backend"]},
        {n: "Network Admin", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500", tech: "Cisco, Cloud", job: "Network Engineer", syl: ["Routing", "Cloud", "Hardware"]},
        {n: "Masonry Tech", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=500", tech: "Construction, CAD", job: "Master Mason", syl: ["Structures", "CAD", "Bricks"]},
        {n: "Cloud Architect", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=500", tech: "AWS, Kubernetes", job: "Cloud Engineer", syl: ["Docker", "AWS", "Scaling"]}
    ];

    function setL(lang) {
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(lang+'-btn').classList.add('active');
        document.getElementById('h-tr').innerText = lang === 'en' ? "15 Career Tracks" : "15 የሙያ መስኮች";
        renderGrid();
    }

    function renderGrid() {
        const g = document.getElementById('course-grid');
        g.innerHTML = tracks.map((t, i) => `
            <div class="card" onclick="openModal(${i})">
                <img src="${t.img}" onerror="this.src='https://via.placeholder.com/500x160'">
                <div class="card-body">
                    <div style="font-weight:bold;">${t.n}</div>
                    <div class="tech-stack">${t.tech}</div>
                    <div class="career-tag">${t.job}</div>
                </div>
            </div>`).join('');
    }

    function openModal(i) {
        const t = tracks[i];
        const prog = Math.floor(Math.random() * 80) + 10;
        document.getElementById('m-title').innerText = t.n;
        document.getElementById('m-content').innerHTML = `
            <p style="color:#94a3b8; margin-bottom:15px;">Target: ${t.job}</p>
            <div style="font-size:0.8rem; display:flex; justify-content:space-between;"><span>Progress</span><span>${prog}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
            <p><strong>Syllabus:</strong><br>${t.syl.join(' • ')}</p>
        `;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    setL('en');
</script>
</body>
</html>
