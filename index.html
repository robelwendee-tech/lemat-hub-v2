<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | 15 Track Expansion</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .ticker { background: var(--yellow); color: black; padding: 12px; text-align: center; font-weight: 800; font-size: 13px; position: sticky; top: 0; z-index: 1000; }
        
        /* DASHBOARD GRID */
        .container { padding: 40px 5%; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); }
        .card-img { width: 100%; height: 160px; object-fit: cover; }

        /* LEARNING PANEL */
        #learning-view { display: none; height: 100vh; grid-template-columns: 1fr 380px; position: fixed; top: 0; left: 0; width: 100%; background: var(--bg); z-index: 2000; }
        .video-area { padding: 30px; overflow-y: auto; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        .sidebar { background: var(--card); border-left: 1px solid #1e293b; padding: 20px; overflow-y: auto; }
        .lesson-card { padding: 15px; background: rgba(255,255,255,0.03); margin-bottom: 12px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
        .writing-panel { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 15px; margin-top: 20px; line-height: 1.8; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="ticker">🚀 PHASE 2 ACTIVE: WEB, CLOUD, MOBILE, SOLAR, AND AUTO CONTENT LOADED</div>

<div id="dashboard">
    <div class="container">
        <h2>Career Development Portal</h2>
        <div class="track-grid" id="track-grid"></div>
    </div>
</div>

<div id="learning-view">
    <div class="video-area">
        <button onclick="closeL()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; margin-bottom:20px;">← BACK</button>
        <h2 id="view-title" style="color:var(--accent);">Course</h2>
        <div class="video-box">
            <div style="text-align:center;">
                <span id="play-btn" style="font-size:60px; color:var(--accent);">▶</span>
                <p id="active-lesson-title">Select Module</p>
            </div>
        </div>
        <div class="writing-panel">
            <h3 id="write-head">Technical Guide</h3>
            <div id="write-body">Select a module to load technical documentation.</div>
        </div>
    </div>
    <div class="sidebar">
        <h3>Course Modules</h3>
        <div id="lesson-list"></div>
    </div>
</div>

<script>
    const tracks = [
        { id: 3, n: "Full-Stack Web", g: "Web Developer", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500",
          lessons: [
              {t: "Frontend Fundamentals", w: "<b>HTML/CSS:</b> Master the box model and Flexbox for responsive layouts. <br><b>JS:</b> Learn DOM manipulation to create interactive UI components."},
              {t: "Backend API Design", w: "<b>Node.js:</b> Setting up an Express server. <br><b>Database:</b> Connecting to MongoDB and creating your first User Schema."}
          ]},
        { id: 4, n: "Cloud Architecture", g: "Cloud Engineer", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500",
          lessons: [
              {t: "Infrastructure as Code", w: "<b>Introduction:</b> Using Terraform to deploy cloud resources. <br><b>IAM:</b> Configuring Identity and Access Management for secure cloud roles."},
              {t: "Serverless Functions", w: "<b>AWS/GCP:</b> Writing your first Lambda function to trigger on file uploads."}
          ]},
        { id: 5, n: "Mobile App Dev", g: "Mobile Developer", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=500",
          lessons: [
              {t: "Flutter Framework", w: "<b>Widgets:</b> Everything is a widget. Build your first Row and Column layout. <br><b>State Management:</b> Using Providers to sync data across app screens."}
          ]},
        { id: 8, n: "Solar Tech", g: "Solar Installer", img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=500",
          lessons: [
              {t: "Photovoltaic Physics", w: "<b>Theory:</b> How sunlight converts to DC electricity. <br><b>Inverters:</b> Converting DC to AC for household usage."},
              {t: "Site Surveying", w: "<b>Calculations:</b> Measuring roof angles and sun exposure (Azimuth) to optimize panel efficiency."}
          ]},
        { id: 11, n: "Auto Mechanics", g: "Auto Tech", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500",
          lessons: [
              {t: "Diagnostic Tools", w: "<b>OBD-II:</b> Connecting scanning tools to read engine fault codes. <br><b>Interpretation:</b> Understanding oxygen sensor data and fuel trim ratios."}
          ]}
    ];

    function render() {
        document.getElementById('track-grid').innerHTML = tracks.map(t => `
            <div class="card" onclick="openL(${t.id})">
                <img src="${t.img}" class="card-img">
                <div style="padding:15px;">
                    <h3>${t.n}</h3>
                    <p style="opacity:0.6; font-size:14px;">Goal: ${t.g}</p>
                    <p style="color:var(--accent); font-weight:bold;">LOAD LESSONS →</p>
                </div>
            </div>`).join('');
    }

    function openL(id) {
        const t = tracks.find(x => x.id === id);
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('learning-view').style.display = 'grid';
        document.getElementById('view-title').innerText = t.n;
        document.getElementById('lesson-list').innerHTML = t.lessons.map(l => `
            <div class="lesson-card" onclick="loadLesson('${l.t}', '${l.w.replace(/'/g, "\\'")}')">
                <strong>${l.t}</strong><br><small style="color:var(--accent);">Module Ready</small>
            </div>`).join('');
    }

    function loadLesson(title, writing) {
        document.getElementById('active-lesson-title').innerText = title;
        document.getElementById('write-head').innerText = "Technical Notes: " + title;
        document.getElementById('write-body').innerHTML = writing;
    }

    function closeL() {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('learning-view').style.display = 'none';
    }

    render();
</script>
</body>
</html>
