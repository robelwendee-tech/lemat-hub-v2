<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --dark: #070b14; --accent: #38bdf8; --success: #10b981; --yellow: #fbbf24; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--dark); color: white; line-height: 1.6; }
        
        /* Header & Navigation */
        header { background: rgba(7, 11, 20, 0.9); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); text-decoration: none; }

        /* The Scrolling Ticker from before */
        .yellow-ticker { background: var(--yellow); color: #000; padding: 10px; font-weight: 700; overflow: hidden; white-space: nowrap; }
        .scrolling-text { display: inline-block; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* Grid & Cards */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #111827; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 170px; object-fit: cover; background: #1e293b; }
        .card-body { padding: 20px; }

        /* Enrollment Badges */
        .status-badge { display: inline-block; margin-top: 10px; padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; background: #374151; color: white; }
        .enrolled { background: var(--success); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ልማት Hub</a>
</header>

<div class="yellow-ticker">
    <div class="scrolling-text">Certified by Digital Ethiopia 2026 | 15 Career Tracks Active | Progress Saved via Fayda ID</div>
</div>

<div class="container">
    <h1 style="margin-bottom: 30px;">Active Career Tracks</h1>
    <div class="grid" id="course-grid"></div>
</div>

<script>
    // Full 15 Tracks restored
    const tracks = [
        {id: 1, n: "Modern Carpentry", img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=600", job: "Master Carpenter"},
        {id: 2, n: "Electrical Systems", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=600", job: "Electrician"},
        {id: 3, n: "AI Engineering", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=600", job: "AI Specialist"},
        {id: 4, n: "Cyber Security", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=600", job: "Security Officer"},
        {id: 5, n: "Auto Mechanics", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=600", job: "Automotive Tech"},
        {id: 6, n: "UI/UX Design", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=600", job: "Product Designer"},
        {id: 7, n: "Solar Tech", img: "https://images.unsplash.com/photo-1509391366360-fe5bb58583bb?w=600", job: "Solar Installer"},
        {id: 8, n: "Web Systems", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600", job: "Full-Stack Dev"},
        {id: 9, n: "Network Admin", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600", job: "Network Engineer"},
        {id: 10, n: "Masonry Tech", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=600", job: "Master Mason"},
        {id: 11, n: "Welding & Metal", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=600", job: "Metal Expert"},
        {id: 12, n: "Cloud Architect", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=600", job: "Cloud Engineer"},
        {id: 13, n: "Data Science", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600", job: "Data Architect"},
        {id: 14, n: "Mobile Dev", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=600", job: "App Developer"},
        {id: 15, n: "Plumbing Tech", img: "https://images.unsplash.com/photo-1581244277943-fe4a9c777189?w=600", job: "Plumber"}
    ];

    function renderGrid() {
        const enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        document.getElementById('course-grid').innerHTML = tracks.map(t => {
            const isEnrolled = enrolled.includes(t.id);
            return `
                <div class="card" onclick="enroll(${t.id})">
                    <img src="${t.img}" onerror="this.src='https://via.placeholder.com/600x400/1e293b/38bdf8?text=${t.n}'">
                    <div class="card-body">
                        <h3 style="color:var(--accent); font-size: 1.1rem;">${t.n}</h3>
                        <p style="opacity:0.6; font-size: 0.8rem;">Target: ${t.job}</p>
                        <div class="status-badge ${isEnrolled ? 'enrolled' : ''}">
                            ${isEnrolled ? '✓ ENROLLED' : 'CLICK TO START'}
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function enroll(id) {
        let enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        if(!enrolled.includes(id)) {
            enrolled.push(id);
            localStorage.setItem('enrolled', JSON.stringify(enrolled));
            renderGrid();
        }
    }

    renderGrid();
</script>
</body>
</html>
