<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --dark: #070b14; --accent: #38bdf8; --yellow: #fbbf24; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #f3f4f6; }
        
        /* HEADER & TICKER */
        header { background: rgba(7, 11, 20, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 24px; font-weight: 800; color: var(--accent); text-decoration: none; }
        .l-btn { padding: 6px 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; border-radius: 8px; font-weight: bold; margin-left: 5px; }
        .l-btn.active { background: var(--accent); color: var(--dark); }
        .yellow-ticker { background: var(--yellow); color: #000; padding: 12px; font-weight: 700; overflow: hidden; white-space: nowrap; }
        .scrolling-text { display: inline-block; animation: scroll 35s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* HERO & FAYDA */
        .hero { padding: 60px 20px; text-align: center; background: linear-gradient(180deg, #111827, #070b14); }
        .id-input { background: rgba(255,255,255,0.05); border: 2px solid var(--accent); color: white; padding: 15px; width: 300px; border-radius: 12px; text-align: center; margin: 20px 0; outline: none; }
        .v-btn { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* GRID */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: #111827; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 160px; object-fit: cover; background: #000; }
        .card-body { padding: 15px; }
        .job-badge { background: rgba(56, 189, 248, 0.1); color: #fff; padding: 5px 12px; border-radius: 10px; font-size: 0.7rem; border: 1px solid rgba(56,189,248,0.2); display: inline-block; margin-top: 10px; }

        /* MODAL */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-box { background: #1f2937; padding: 30px; border-radius: 25px; max-width: 450px; width: 90%; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ልማት Hub</a>
    <div>
        <button class="l-btn active" onclick="setL('en')" id="en-btn">EN</button>
        <button class="l-btn" onclick="setL('am')" id="am-btn">አማር</button>
    </div>
</header>

<div class="yellow-ticker">
    <div class="scrolling-text">15 Career Tracks Active | Certified by Digital Ethiopia 2026 | New Vocational Workshops Opening.</div>
</div>

<div class="hero" id="hero-sec"></div>

<div class="container">
    <h2 style="margin-bottom:20px;" id="h-tr">15 Career Tracks</h2>
    <div class="grid" id="course-grid"></div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h2 id="m-title" style="color:var(--accent);"></h2>
        <p id="m-syl" style="margin-top:15px; font-size:0.9rem; line-height:1.6;"></p>
        <button onclick="closeModal()" style="background:var(--yellow); width:100%; padding:12px; border:none; border-radius:10px; font-weight:bold; margin-top:20px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const tracks = [
        {n: "Modern Carpentry", img: "https://images.unsplash.com/photo-1621290621119-7d1c103bc3f1?w=500", job: "Master Carpenter", syl: "Learn power tools, furniture design, and finishing."},
        {n: "Electrical Systems", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=500", job: "Electrician", syl: "Learn wiring, solar installation, and safety."},
        {n: "AI Engineering", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=500", job: "AI Specialist", syl: "Python, neural networks, and ML models."},
        {n: "Cyber Security", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500", job: "Security Officer", syl: "Network defense and ethical hacking."},
        {n: "Auto Mechanics", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500", job: "Automotive Tech", syl: "Engine repair and EV diagnostics."},
        {n: "UI/UX Design", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=500", job: "Product Designer", syl: "Figma, wireframing, and user testing."},
        {n: "Solar Tech", img: "https://images.unsplash.com/photo-1509391366360-fe5bb58583bb?w=500", job: "Renewable Expert", syl: "PV panels and battery management."},
        {n: "Web Systems", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500", job: "Full-Stack Dev", syl: "React, Node.js, and Databases."},
        {n: "Network Admin", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500", job: "Network Engineer", syl: "Cisco and Cloud infrastructure."},
        {n: "Masonry Tech", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=500", job: "Master Mason", syl: "Construction and CAD reading."},
        {n: "Welding & Metal", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=500", job: "Metal Fabricator", syl: "MIG/TIG welding and fabrication."},
        {n: "Cloud Architect", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=500", job: "Cloud Solutions", syl: "AWS, Docker, and Kubernetes."},
        {n: "Data Science", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500", job: "Data Scientist", syl: "SQL, Python, and Big Data."},
        {n: "Mobile Dev", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=500", job: "App Developer", syl: "Flutter and Mobile backend."},
        {n: "Graphic Design", img: "https://images.unsplash.com/photo-1626785774573-4b799315345d?w=500", job: "Creative Director", syl: "Branding and digital illustration."}
    ];

    const dict = {
        en: {w:"National Career Hub", s:"Enter 10-Digit Fayda ID", v:"VERIFY", tr:"15 Career Tracks"},
        am: {w:"ብሄራዊ የሙያ ማዕከል", s:"ባለ 10 አሃዝ የፋይዳ መታወቂያ", v:"አረጋግጥ", tr:"15 የሙያ መስኮች"}
    };

    function setL(lang) {
        const d = dict[lang];
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(lang+'-btn').classList.add('active');

        document.getElementById('hero-sec').innerHTML = `
            <h1 style="font-size:3rem; margin-bottom:10px;">${d.w}</h1>
            <p style="color:#94a3b8;">${d.s}</p>
            <input type="number" class="id-input" placeholder="0000000000"><br>
            <button class="v-btn" onclick="alert('Verified')">${d.v}</button>`;
        
        document.getElementById('h-tr').innerText = d.tr;
        renderGrid();
    }

    function renderGrid() {
        document.getElementById('course-grid').innerHTML = tracks.map((t, i) => `
            <div class="card" onclick="openModal(${i})">
                <img src="${t.img}" onerror="this.src='https://via.placeholder.com/600x400?text=Career+Track'">
                <div class="card-body">
                    <div style="font-weight:700;">${t.n}</div>
                    <div class="job-badge">${t.job}</div>
                </div>
            </div>`).join('');
    }

    function openModal(i) {
        const t = tracks[i];
        document.getElementById('m-title').innerText = t.n;
        document.getElementById('m-syl').innerHTML = `<strong>Goal:</strong> ${t.job}<br><br><strong>Syllabus:</strong> ${t.syl}`;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    
    setL('en');
</script>
</body>
</html>
