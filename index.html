<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* TICKER */
        .ticker-wrap { background: var(--yellow); color: black; padding: 12px; font-weight: 800; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 1000; }
        .ticker-move { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        nav { background: #0f172a; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* COURSE CARDS */
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        
        /* TRACKER OVERLAY */
        #tracker-page { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 8000; padding: 50px; overflow-y: auto; }
        .tracker-card { background: var(--card); border: 2px solid var(--accent); padding: 30px; border-radius: 15px; max-width: 600px; margin: 0 auto; }
        .progress-bar { background: #1e293b; height: 15px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: var(--green); height: 100%; width: 0%; transition: 0.5s; }

        .job-card { border: 2px solid var(--yellow); padding: 20px; border-radius: 15px; background: var(--card); text-align: center; }
        .salary { color: var(--green); font-size: 24px; font-weight: 900; display: block; margin: 10px 0; }
        
        #reg-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; justify-content: center; align-items: center; }
        .modal-box { background: white; color: black; padding: 30px; border-radius: 15px; width: 350px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker-move">🚀 2026 GLOBAL INDUSTRIAL HUB | 15 RESEARCH TRACKS LIVE | HIGHEST SALARY: 85,000 ETB | CLICK A COURSE TO START LEARNING</div>
</div>

<nav>
    <div style="font-size: 26px; font-weight: 900; color: var(--accent);">ልማት Hub</div>
    <button onclick="document.getElementById('reg-modal').style.display='flex'" style="background:var(--green); border:none; padding:10px 20px; color:white; border-radius:5px; font-weight:bold; cursor:pointer;">REGISTRATION</button>
</nav>

<div class="container">
    <h2 style="color:var(--accent);">Professional Research Tracks (15)</h2>
    <div class="grid" id="course-list"></div>
</div>

<div class="container" style="background: rgba(251, 191, 36, 0.05); border-top: 1px solid #1e293b;">
    <h2 style="color:var(--yellow);">Partner Companies & Salaries</h2>
    <div class="grid" id="job-list"></div>
</div>

<div id="tracker-page">
    <button onclick="document.getElementById('tracker-page').style.display='none'" style="background:var(--yellow); border:none; padding:10px 20px; font-weight:bold; cursor:pointer; border-radius:5px;">← BACK TO HUB</button>
    <div class="tracker-card" style="margin-top:40px;">
        <h1 id="track-name" style="color:var(--accent);"></h1>
        <p id="track-desc"></p>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <p id="track-status">Initializing research modules...</p>
    </div>
</div>

<div id="reg-modal">
    <div class="modal-box">
        <h2 style="margin-top:0;">Registration</h2>
        <input type="text" id="u-name" placeholder="Full Name">
        <select id="u-feel">
            <option>Excited to start research</option>
            <option>Ambitious for 85,000 ETB</option>
        </select>
        <button onclick="alert('Welcome! Profile Locked.'); document.getElementById('reg-modal').style.display='none'" style="width:100%; background:var(--green); color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT</button>
    </div>
</div>

<script>
    const allTracks = [
        {id: 1, n: "Python for AI", s: "75,000 ETB", c: "Tech-Ethiopia", d: "Researching local API integration.", img: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=600"},
        {id: 2, n: "Cloud Architecture", s: "85,000 ETB", c: "Abyssinia Cloud", d: "Testing serverless deployment.", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600"},
        {id: 3, n: "Solar Technology", s: "45,000 ETB", c: "Green-Nile Power", d: "Analyzing photovoltaic efficiency.", img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=600"},
        {id: 4, n: "EV Engineering", s: "65,000 ETB", c: "Eco-Drive Motors", d: "Battery management systems.", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=600"},
        {id: 5, n: "Cyber Security", s: "70,000 ETB", c: "Safe-Net Africa", d: "Network stress testing.", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=600"},
        {id: 6, n: "Data Science", s: "80,000 ETB", c: "Insight Data", d: "Predictive manufacturing models.", img: "https://images.unsplash.com/photo-1551288049-bbbda536339a?w=600"},
        {id: 7, n: "UI/UX Design", s: "48,000 ETB", c: "Creative Hub", d: "Industrial interface design.", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=600"},
        {id: 8, n: "Network Admin", s: "55,000 ETB", c: "Global-Link", d: "5G private network setup.", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=600"},
        {id: 9, n: "Plumbing Tech", s: "38,000 ETB", c: "Hydro-Flow", d: "Smart leak detection sensors.", img: "https://images.unsplash.com/photo-1585704032915-c3400ca1f963?w=600"},
        {id: 10, n: "Carpentry Tech", s: "34,000 ETB", c: "Build-Ethio", d: "Sustainable timber research.", img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=600"},
        {id: 11, n: "Masonry Tech", s: "36,000 ETB", c: "Ethio-Blocks", d: "Carbon-neutral concrete tests.", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=600"},
        {id: 12, n: "Electrical Sys", s: "52,000 ETB", c: "Power-Grid", d: "Smart-grid safety monitoring.", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=600"},
        {id: 13, n: "Welding Tech", s: "42,000 ETB", c: "Steel-Front", d: "Robotic arc welding simulation.", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=600"},
        {id: 14, n: "Mobile App Dev", s: "60,000 ETB", c: "App-World", d: "Inventory tracking app logic.", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=600"},
        {id: 15, n: "AI Ethics", s: "68,000 ETB", c: "Future-Guard", d: "Ethical deployment frameworks.", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=600"}
    ];

    function render() {
        document.getElementById('course-list').innerHTML = allTracks.map((t, i) => `
            <div class="card" onclick="openTracker(${i})">
                <img src="${t.img}">
                <div style="padding:15px;"><strong>${t.n}</strong></div>
            </div>`).join('');
            
        document.getElementById('job-list').innerHTML = allTracks.slice(0, 8).map(t => `
            <div class="job-card">
                <h3>${t.c}</h3>
                <small>Hiring: ${t.n}</small>
                <span class="salary">${t.s}</span>
            </div>`).join('');
    }

    function openTracker(idx) {
        const item = allTracks[idx];
        document.getElementById('track-name').innerText = item.n;
        document.getElementById('track-desc').innerText = item.d;
        document.getElementById('tracker-page').style.display = 'block';
        let w = 0;
        let fill = document.getElementById('fill');
        let interval = setInterval(() => {
            if(w >= 100) clearInterval(interval);
            else { w++; fill.style.width = w + "%"; }
        }, 20);
    }

    render();
</script>
</body>
</html>
