// This is the core logic that prevents the images from disappearing
function renderGrid() {
    const grid = document.getElementById('course-grid');
    // We Map through the 'tracks' array which now HAS the verified Unsplash links
    grid.innerHTML = tracks.map((t, i) => `
        <div class="card" onclick="openModal(${i})">
            <img src="${t.img}" loading="lazy"> <div class="card-body">
                <div class="track-name">${t.n}</div>
                <div class="job-badge">${t.job}</div>
            </div>
        </div>`).join('');
}
