<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Official 2026</title>
    <style>
        /* CSS FIX: Restores the dark theme */
        :root { --dark: #05080f; --accent: #38bdf8; --yellow: #fbbf24; --card: #0f172a; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        header { padding: 20px 5%; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { color: var(--accent); font-size: 24px; font-weight: 800; text-decoration: none; }

        /* Job Board Styling */
        .job-section { padding: 30px 5%; border-bottom: 1px solid var(--accent); background: rgba(56,189,248,0.03); }
        .job-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .job-card { background: var(--card); border: 1px solid var(--yellow); padding: 15px; border-radius: 12px; min-width: 220px; }
        .tag { background: var(--yellow); color: black; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px; }

        /* Tracks Styling */
        .container { padding: 40px 5%; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { background: var(--accent); color: black; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
        .enrolled { border-color: #10b981; }
    </style>
</head>
<body>

<header><a href="#" class="logo">ልማት Hub</a></header>

<div class="job-section">
    <h2 style="margin-top:0;">Live Job Board (2026)</h2>
    <div class="job-grid" id="job-list">
        </div>
</div>

<div class="container">
    <h2>15 Career Tracks</h2>
    <div class="track-grid" id="track-list"></div>
</div>

<script>
    /* JAVASCRIPT FIX: Restores the interactive logic */
    const tracks = [
        {id: 1, n: "Modern Carpentry", job: "Master Carpenter", co: "Ethio-Construction", sal: "25k ETB"},
        {id: 2, n: "Electrical Systems", job: "Electrician", co: "Addis Electric", sal: "30k ETB"},
        {id: 3, n: "AI Engineering", job: "AI Specialist", co: "Tech-Hub AA", sal: "45k ETB"},
        {id: 4, n: "Cyber Security", job: "Security Expert", co: "Cyber-Safeguard", sal: "40k ETB"}
    ];

    function render() {
        const enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        
        // Render Tracks
        document.getElementById('track-list').innerHTML = tracks.map(t => `
            <div class="card ${enrolled.includes(t.id) ? 'enrolled' : ''}">
                <h3 style="color:var(--accent);">${t.n}</h3>
                <p style="opacity:0.6; font-size:14px;">Target: ${t.job}</p>
                <button class="btn" onclick="enroll(${t.id})">
                    ${enrolled.includes(t.id) ? '✓ ENROLLED' : 'VIEW SYLLABUS'}
                </button>
            </div>
        `).join('');

        // Render Jobs
        const jobContainer = document.getElementById('job-list');
        const activeJobs = tracks.filter(t => enrolled.includes(t.id));
        
        if(activeJobs.length > 0) {
            jobContainer.innerHTML = activeJobs.map(j => `
                <div class="job-card">
                    <span class="tag">OPENING</span>
                    <h4 style="margin: 10px 0 5px 0;">${j.job}</h4>
                    <div style="font-size:12px; opacity:0.8;">${j.co} • ${j.sal}</div>
                </div>
            `).join('');
        } else {
            jobContainer.innerHTML = '<p style="opacity:0.5;">Enroll in a track to see job openings...</p>';
        }
    }

    function enroll(id) {
        let enrolled = JSON.parse(localStorage.getItem('enrolled')) || [];
        if(!enrolled.includes(id)) enrolled.push(id);
        localStorage.setItem('enrolled', JSON.stringify(enrolled));
        render();
    }

    render();
</script>
</body>
</html>
