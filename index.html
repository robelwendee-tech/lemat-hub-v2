<!DOCTYPE html>
<html>
<head>
    <title>ልማት Hub | 2026</title>
    <style>
        body { background: #05080f; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #0f172a; border: 1px solid #38bdf8; padding: 15px; border-radius: 10px; cursor: pointer; }
        .card img { width: 100%; border-radius: 8px; }
        #study-room { display: none; position: fixed; inset: 0; background: #05080f; padding: 50px; }
        .reg-box { background: white; color: black; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 50px; }
        input { display: block; margin: 10px auto; padding: 10px; width: 80%; }
    </style>
</head>
<body>
    <h1 style="color:#38bdf8;">ልማት Hub</h1>
    <button onclick="document.getElementById('reg').style.display='block'" style="background:#10b981; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">REGISTRATION</button>

    <div class="grid" id="course-list"></div>

    <div id="reg" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);">
        <div class="reg-box">
            <h2>Personal Details</h2>
            <input type="text" id="uName" placeholder="Full Name">
            <input type="number" placeholder="Age">
            <button onclick="saveUser()" style="background:#10b981; color:white; width:100%; padding:10px; border:none; cursor:pointer;">SUBMIT</button>
        </div>
    </div>

    <div id="study-room">
        <button onclick="location.reload()" style="background:#fbbf24; padding:10px;">BACK</button>
        <h1 id="st-title"></h1>
        <p id="st-desc"></p>
    </div>

    <script>
        const tracks = [
            {id: 1, n: "Python for AI", d: "Researching AI and Python 3.12.", img: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?w=400"},
            {id: 4, n: "Cloud Architecture", d: "Cloud migration protocols.", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400"},
            {id: 8, n: "Solar Tech", d: "Solar energy storage research.", img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=400"}
        ];

        let user = "Student";

        function render() {
            document.getElementById('course-list').innerHTML = tracks.map(t => `
                <div class="card" onclick="openTrack(${t.id})">
                    <img src="${t.img}">
                    <h3>${t.n}</h3>
                </div>`).join('');
        }

        function saveUser() {
            user = document.getElementById('uName').value || "Student";
            document.getElementById('reg').style.display = 'none';
            alert("Welcome, " + user);
        }

        function openTrack(id) {
            const t = tracks.find(x => x.id === id);
            document.getElementById('study-room').style.display = 'block';
            document.getElementById('st-title').innerText = user + "'s " + t.n;
            document.getElementById('st-desc').innerText = t.d;
        }

        render();
    </script>
</body>
</html>
