<div id="main-dashboard">
    </div>

<div id="tracker-overlay" style="display:none; position:fixed; inset:0; background:white; z-index:9999;">
    <h1 id="track-title">Live Research Tracker</h1>
    <div id="progress-container" style="width:80%; height:20px; background:#eee; margin:20px auto;">
        <div id="progress-bar" style="width:0%; height:100%; background:#00bfa5;"></div>
    </div>
</div>

<script>
function openTracker(courseName) {
    // Show the tracker and fill the content
    document.getElementById('tracker-overlay').style.display = 'block';
    document.getElementById('track-title').innerHTML = courseName;
    
    let width = 0;
    let bar = document.getElementById('progress-bar');
    let interval = setInterval(() => {
        if (width >= 100) {
            clearInterval(interval);
        } else {
            width++;
            bar.style.width = width + '%';
        }
    }, 50);
}
</script>
