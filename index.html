<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --teal: #00bfa5; --coral: #ff7675; --bg: #05080f; --card: #0f172a; --yellow: #fbbf24; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; }

        /* HEADER & TICKER */
        .ticker { background: var(--yellow); color: black; padding: 10px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 3000; }
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 40px; z-index: 2000; }
        .logo { font-size: 28px; font-weight: 900; color: var(--teal); }
        .logo span { color: #333; font-weight: 400; }
        
        /* GRID */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--teal); transform: translateY(-5px); }
        .card img { width: 100%; height: 150px; object-fit: cover; }

        /* TRACKER OVERLAY */
        #tracker-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 50px; text-align: center; }
        .progress-bar { background: #1e293b; height: 15px; border-radius: 10px; margin: 30px auto; width: 80%; overflow: hidden; }
        .progress-fill { background: var(--teal); height: 100%; width: 0%; }
    </style>
</head>
<body>

<div class="ticker">🚀 2026 INDUSTRIAL HUB | 15 RESEARCH TRACKS LIVE | HIGHEST SALARY: 85,000 ETB</div>

<header>
    <div class="logo">ልማት<span>hub</span></div>
    <nav>
        <a href="#" style="color:#333; text-decoration:none; margin:0 15px; font-weight:600;">ABOUT US</a>
        <a href="#" style="color:var(--teal); text-decoration:none; margin:0 15px; font-weight:700; border-bottom:2px solid var(--teal);">BLOG</a>
    </nav>
    <button style="border:1.5px solid var(--coral); color:var(--coral); background:transparent; padding:10px 25px; border-radius:50px; font-weight:700;">CONTACT US</button>
</header>

<div class="container">
    <h2 style="color: var(--teal);">Select Your Course (15)</h2>
    <div class="grid" id="course-grid"></div>
</div>

<div id="tracker-overlay">
    <button onclick="document.getElementById('tracker-overlay').style.display='none'" style="background:var(--coral); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; float:left;">← BACK</button>
    <h1 id="active-track" style="margin-top:100px; color:var(--teal);">Live Research Tracker</h1>
    <div class="progress-bar"><div class="progress-fill" id="fill-bar"></div></div>
    <p id="status">Initializing Industrial Modules...</p>
</div>

<script>
    // THE FULL 15 TRACKS
    const tracks = [
        {n: "Python for AI", img: "https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?w=400"},
        {n: "Solar Energy", img: "https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg?w=400"},
        {n: "Cloud Systems", img: "https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg?w=400"},
        {n: "EV Engineering", img: "https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg?w=400"},
        {n: "Cyber Security", img: "https://images.pexels.com/photos/60504/security-protection-anti-virus-software-60504.jpeg?w=400"},
        {n: "Data Science", img: "https://images.pexels.com/photos/265087/pexels-photo-265087.jpeg?w=400"},
        {n: "UI/UX Design", img: "https://images.pexels.com/photos/196644/pexels-photo-196644.jpeg?w=400"},
        {n: "Network Admin", img: "https://images.pexels.com/photos/442150/pexels-photo-442150.jpeg?w=400"},
        {n: "Mobile App Dev", img: "https://images.pexels.com/photos/1092644/pexels-photo-1092644.jpeg?w=400"},
        {n: "AI Ethics", img: "https://images.pexels.com/photos/8386440/pexels-photo-8386440.jpeg?w=400"},
        {n: "Plumbing Tech", img: "https://images.pexels.com/photos/2310904/pexels-photo-2310904.jpeg?w=400"},
        {n: "Carpentry Tech", img: "https://images.pexels.com/photos/1249611/pexels-photo-1249611.jpeg?w=400"},
        {n: "Masonry Tech", img: "https://images.pexels.com/photos/159306/construction-site-build-construction-work-159306.jpeg?w=400"},
        {n: "Electrical Sys", img: "https://images.pexels.com/photos/257736/pexels-photo-257736.jpeg?w=400"},
        {n: "Welding Tech", img: "https://images.pexels.com/photos/2381463/pexels-photo-2381463.jpeg?w=400"}
    ];

    function render() {
        const grid = document.getElementById('course-grid');
        grid.innerHTML = tracks.map(t => `
            <div class="card" onclick="startResearch('${t.n}')">
                <img src="${t.img}">
                <div style="padding:15px;"><strong>${t.n}</strong></div>
            </div>
        `).join('');
    }

    function startResearch(name) {
        document.getElementById('active-track').innerText = name;
        document.getElementById('tracker-overlay').style.display = 'block';
        let w = 0;
        let bar = document.getElementById('fill-bar');
        let interval = setInterval(() => {
            if(w >= 100) clearInterval(interval);
            else { w++; bar.style.width = w + '%'; }
        }, 50);
    }
    render();
</script>
</body>
</html>
