<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Full Portal 2026</title>
    <style>
        :root { --teal: #00bfa5; --coral: #ff7675; --bg: #05080f; --card: #0f172a; --yellow: #fbbf24; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; }

        /* HEADER & TICKER */
        .ticker { background: var(--yellow); color: black; padding: 10px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 3000; }
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 40px; z-index: 2000; border-bottom: 1px solid #eee; }
        .logo { font-size: 28px; font-weight: 900; color: var(--teal); display: flex; gap: 5px; }
        .logo span { color: #333; font-weight: 400; }
        .nav-link { text-decoration: none; color: #333; font-weight: 600; margin: 0 15px; font-size: 14px; }
        .btn-contact { border: 1.5px solid var(--coral); color: var(--coral); background: transparent; padding: 10px 25px; border-radius: 50px; font-weight: 700; cursor: pointer; }

        /* GRID CONTENT */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; cursor: pointer; transition: 0.3s; }
        .card img { width: 100%; height: 160px; object-fit: cover; }

        /* AI ASSISTANT */
        #ai-container { position: fixed; bottom: 80px; right: 20px; width: 300px; background: #1e293b; border-radius: 10px; z-index: 4000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ai-header { background: #2d3748; padding: 10px; font-weight: bold; border-radius: 10px 10px 0 0; }
        .ai-chat { height: 180px; padding: 10px; overflow-y: auto; font-size: 13px; }

        /* TRACKER */
        #tracker-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 50px; text-align: center; }
        .progress-bar { background: #1e293b; height: 15px; border-radius: 10px; margin: 30px auto; width: 80%; overflow: hidden; }
        .progress-fill { background: var(--teal); height: 100%; width: 0%; }
    </style>
</head>
<body>

<div class="ticker">🚀 2026 INDUSTRIAL HUB | 15 RESEARCH TRACKS LIVE | HIGHEST SALARY: 85,000 ETB</div>

<header>
    <div class="logo">ልማት<span>hub</span></div>
    <nav>
        <a href="#" class="nav-link">SERVICES</a>
        <a href="#" class="nav-link" style="color:var(--teal); border-bottom:2px solid var(--teal);">RESEARCH</a>
    </nav>
    <button class="btn-contact">CONTACT US</button>
</header>

<div class="container">
    <h2 style="color: var(--teal);">Select Your Course (15)</h2>
    <div class="grid" id="course-grid"></div>
</div>

<div id="tracker-overlay">
    <button onclick="document.getElementById('tracker-overlay').style.display='none'" style="background:var(--coral); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; float:left;">← BACK</button>
    <h1 id="active-track" style="margin-top:100px; color:var(--teal);">Research Tracker</h1>
    <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
    <p>Status: Synchronizing Modules...</p>
</div>

<div id="ai-container">
    <div class="ai-header">AI Hub Assistant</div>
    <div id="ai-messages" class="ai-chat">AI: Hello! How can I help with your industrial career today?</div>
    <div style="padding:10px; border-top:1px solid #333; display:flex;">
        <input type="text" id="ai-input" placeholder="Ask about salaries..." style="flex:1; padding:5px; border-radius:3px; border:none;">
        <button onclick="askAI()" style="background:var(--teal); color:white; border:none; padding:5px; margin-left:5px; border-radius:3px;">Send</button>
    </div>
</div>

<button onclick="toggleAI()" style="position:fixed; bottom:20px; right:20px; background:var(--teal); color:white; border:none; width:60px; height:60px; border-radius:50%; font-weight:bold; cursor:pointer; font-size:24px;">AI</button>

<script>
    const tracks = [
        {n: "Python for AI", img: "https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?w=400"},
        {n: "Solar Energy", img: "https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg?w=400"},
        {n: "Cloud Systems", img: "https://images.pexels.com/photos/1181244/pexels-photo-1181244.jpeg?w=400"},
        {n: "EV Engineering", img: "https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg?w=400"},
        {n: "Data Science", img: "https://images.pexels.com/photos/265087/pexels-photo-265087.jpeg?w=400"}
    ];

    function init() {
        const grid = document.getElementById('course-grid');
        grid.innerHTML = tracks.map(t => `
            <div class="card" onclick="openTracker('${t.n}')">
                <img src="${t.img}">
                <div style="padding:15px;"><strong>${t.n}</strong></div>
            </div>`).join('');
    }

    function openTracker(name) {
        document.getElementById('active-track').innerText = name;
        document.getElementById('tracker-overlay').style.display = 'block';
        let w = 0; let b = document.getElementById('bar');
        let t = setInterval(() => { if(w >= 100) clearInterval(t); else { w++; b.style.width = w + '%'; } }, 30);
    }

    function toggleAI() {
        const box = document.getElementById('ai-container');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function askAI() {
        let q = document.getElementById('ai-input').value;
        if(q) {
            document.getElementById('ai-messages').innerHTML += `<div><b>You:</b> ${q}</div>`;
            document.getElementById('ai-input').value = "";
            setTimeout(() => { document.getElementById('ai-messages').innerHTML += `<div style="color:var(--teal);"><b>AI:</b> The highest salary is 85,000 ETB!</div>`; }, 600);
        }
    }
    init();
</script>
</body>
</html>
