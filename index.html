<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ልማት Hub | Master 2026</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .ticker { background: var(--yellow); color: black; padding: 12px; font-weight: 800; text-align: center; }
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* REGISTRATION MODAL */
        #reg-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; justify-content: center; align-items: center; }
        .modal-box { background: white; color: black; padding: 30px; border-radius: 15px; width: 380px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        /* SMART ASSISTANT */
        #reception-box { display: none; position: fixed; bottom: 80px; left: 20px; width: 320px; background: white; color: black; border-radius: 12px; z-index: 10000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); overflow: hidden; }
        .chat-display { height: 200px; padding: 15px; overflow-y: auto; background: #f1f5f9; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
    </style>
</head>
<body>

<div class="ticker">🚀 2026 INDUSTRIAL HUB | 15 TRACKS LIVE | PERSONALIZED RESEARCH ASSISTANT</div>

<nav style="background:#0f172a; padding:15px 5%; display:flex; justify-content:space-between; align-items:center;">
    <div style="font-size: 26px; font-weight: 900; color: var(--accent);">ልማት Hub</div>
    <button onclick="openModal('reg-modal')" style="background:var(--green); border:none; padding:10px 20px; color:white; border-radius:5px; font-weight:bold; cursor:pointer;">REGISTRATION</button>
</nav>

<div id="reg-modal">
    <div class="modal-box">
        <h2 style="margin:0 0 15px 0; color:var(--card);">Register Your Profile</h2>
        <input type="text" id="reg-name" placeholder="Full Name">
        <input type="number" id="reg-age" placeholder="Age">
        <input type="email" id="reg-email" placeholder="Email Address">
        
        <label style="font-size:12px; font-weight:bold; color:#666;">How are you feeling today?</label>
        <select id="reg-feeling">
            <option value="Excited">Excited to start research</option>
            <option value="Ambitious">Ambitious for high salary</option>
            <option value="Determined">Determined to finish 15 tracks</option>
        </select>
        
        <button onclick="saveUser()" style="width:100%; background:var(--green); color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">LOCK IN MY PROFILE</button>
    </div>
</div>

<div id="reception-box">
    <div style="background:var(--card); color:white; padding:12px; font-weight:bold; display:flex; justify-content:space-between;">
        <span>AI Reception Assistant</span>
        <span onclick="closeModal('reception-box')" style="cursor:pointer;">×</span>
    </div>
    <div class="chat-display" id="chat-box">
        <div><strong>Assistant:</strong> Hello! Please register so I can personalize your 2026 hub experience.</div>
    </div>
    <div style="display:flex; padding:10px; border-top:1px solid #ddd;">
        <input type="text" id="user-in" placeholder="Ask me anything..." style="margin:0; flex:1;">
        <button onclick="sendMsg()" style="background:var(--accent); border:none; padding:8px; color:white; margin-left:5px; border-radius:4px; cursor:pointer;">Send</button>
    </div>
</div>

<button onclick="openModal('reception-box')" style="position:fixed; bottom:20px; left:20px; background:var(--yellow); border:none; padding:15px 25px; border-radius:50px; font-weight:bold; cursor:pointer;">HELP RECEPTION</button>

<script>
    let userName = "Student";
    let userFeeling = "Neutral";

    function saveUser() {
        userName = document.getElementById('reg-name').value || "Student";
        userFeeling = document.getElementById('reg-feeling').value;
        closeModal('reg-modal');
        
        // Assistant AI responds to your feeling
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div style="color:var(--green)"><strong>System:</strong> ${userName} registered!</div>`;
        chatBox.innerHTML += `<div><strong>Assistant:</strong> It's great to hear you are <b>${userFeeling}</b> today, ${userName}! I'm here to help you finish all 15 tracks.</div>`;
    }

    function sendMsg() {
        const input = document.getElementById('user-in');
        const box = document.getElementById('chat-box');
        if(input.value) {
            box.innerHTML += `<div><strong>${userName}:</strong> ${input.value}</div>`;
            const q = input.value.toLowerCase();
            input.value = "";
            
            setTimeout(() => {
                let reply = "I am processing your request for the 15 tracks.";
                if(q.includes("salary")) reply = "The highest salary is 85,000 ETB for Cloud Architecture.";
                if(q.includes("how i feel")) reply = "You told me you are feeling " + userFeeling + " today!";
                box.innerHTML += `<div><strong>Assistant:</strong> ${reply}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 600);
        }
    }

    function openModal(id) { document.getElementById(id).style.display = id === 'reg-modal' ? 'flex' : 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
