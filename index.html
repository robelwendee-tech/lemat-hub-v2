<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Interactive 2026</title>
    <style>
        :root { --dark: #0f172a; --accent: #38bdf8; --yellow: #FFD700; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #f8fafc; overflow-x: hidden; }
        
        /* HEADER & TICKER */
        header { background: rgba(15, 23, 42, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent); text-decoration: none; }
        .l-btn { padding: 6px 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; border-radius: 8px; margin-left: 5px; }
        .l-btn.active { background: var(--accent); color: var(--dark); }
        .yellow-tracker { background: var(--yellow); color: #000; padding: 10px; font-weight: 800; overflow: hidden; white-space: nowrap; }
        .scrolling-text { display: inline-block; animation: scroll 35s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* GRID & CARDS */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section-h { font-size: 1.8rem; margin: 40px 0 20px; border-left: 8px solid var(--yellow); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .card { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 15px; }
        .tech-stack { font-size: 0.8rem; color: var(--accent); margin: 5px 0; }
        .career-tag { font-size: 0.7rem; background: rgba(56, 189, 248, 0.1); padding: 4px 10px; border-radius: 8px; color: #fff; border: 1px solid rgba(56,189,248,0.3); }

        /* MODAL (THE INVISIBLE PART) */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-box { background: #1e293b; padding: 30px; border-radius: 25px; max-width: 500px; width: 90%; border: 2px solid var(--accent); position: relative; text-align: center; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #94a3b8; }
        .syllabus-list { text-align: left; margin: 20px 0; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .enroll-btn { background: var(--yellow); color: #000; padding: 12px 30px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ልማት Hub</a>
    <div>
        <button class="l-btn active" onclick="setL('en')" id="en-btn">EN</button>
        <button class="l-btn" onclick="setL('am')" id="am-btn">አማር</button>
    </div>
</header>

<div class="yellow-tracker">
    <div class="scrolling-text">Touch any course card to view the syllabus and enrollment details. | Registration for 2026 is Open.</div>
</div>

<div class="container">
    <h2 class="section-h" id="h-tr">15 Career Tracks</h2>
    <div class="grid" id="course-grid"></div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">×</span>
        <h2 id="m-title" style="color:var(--accent);">Course Detail</h2>
        <p id="m-job" style="color:#94a3b8; font-weight:bold;"></p>
        <div class="syllabus-list" id="m-syllabus"></div>
        <button class="enroll-btn" onclick="alert('Confirming Fayda ID...')">ENROLL NOW</button>
    </div>
</div>

<footer style="text-align:center; padding:40px; color:#475569;">© 2026 ልማት Hub | Developed by Robel</footer>

<script>
    const tracks = [
        {n: "Modern Carpentry", img: "https://images.unsplash.com/photo-1621290621119-7d1c103bc3f1?w=500", tech: "Woodwork, Design", job: "Master Carpenter", syl: ["Safety Protocols", "Power Tool Mastery", "Furniture Design", "Wood Finishing"]},
        {n: "Electrical Systems", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=500", tech: "Solar, Smart Grid", job: "Electrician", syl: ["Circuit Design", "Solar Panel Install", "Building Codes", "Maintenance"]},
        {n: "AI Engineering", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=500", tech: "Python, ML", job: "AI Specialist", syl: ["Python Basics", "Neural Networks", "Data Cleaning", "AI Deployment"]},
        {n: "Cyber Security", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500", tech: "Defense, Hacking", job: "Security Officer", syl: ["Network Defense", "Ethical Hacking", "Cryptography", "Risk Audit"]},
        {n: "Auto Mechanics", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500", tech: "EV Diagnostics", job: "Technician", syl: ["Engine Repair", "Hybrid Systems", "Brake Diagnostics", "Auto Electronics"]},
        {n: "Plumbing Tech", img: "https://images.unsplash.com/photo-1581244277943-fe4a9c777189?w=500", tech: "Modern Piping", job: "Plumber", syl: ["Water Systems", "Drainage Layout", "Pipe Fabrication", "Repair Tech"]},
        {n: "Web Systems", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500", tech: "React, Node.js", job: "Full-Stack Dev", syl: ["Frontend UI", "Backend APIs", "Database Management", "Deployment"]},
        {n: "Data Science", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500", tech: "SQL, Analysis", job: "Data Architect", syl: ["Data Visuals", "Predictive Models", "Big Data SQL", "Python for Data"]},
        {n: "Welding & Metal", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=500", tech: "MIG Fabrication", job: "Metal Expert", syl: ["Arc Welding", "Blueprint Reading", "Metal Safety", "Project Build"]},
        {n: "UI/UX Design", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=500", tech: "Figma, Research", job: "Designer", syl: ["User Research", "Wireframing", "Visual Prototyping", "UX Testing"]},
        {n: "Solar Tech", img: "https://images.unsplash.com/photo-1509391366360-fe5bb58583bb?w=500", tech: "PV Panels, Battery", job: "Solar Installer", syl: ["Energy Math", "Panel Placement", "Battery Storage", "Off-grid Setup"]},
        {n: "Mobile Dev", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=500", tech: "Flutter, Firebase", job: "App Developer", syl: ["Dart Basics", "Widget Design", "Backend Sync", "App Store Release"]},
        {n: "Network Admin", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500", tech: "Cisco, Cloud", job: "Network Engineer", syl: ["Switching/Routing", "Cloud Networks", "Security Config", "Troubleshooting"]},
        {n: "Masonry Tech", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=500", tech: "Construction, CAD", job: "Master Mason", syl: ["Material Science", "CAD Reading", "Structure Build", "Wall Finishing"]},
        {n: "Cloud Architect", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=500", tech: "AWS, Kubernetes", job: "Cloud Engineer", syl: ["Server Setup", "Docker/Containers", "Scale Strategy", "Cloud Costing"]}
    ];

    function renderGrid() {
        const g = document.getElementById('course-grid');
        g.innerHTML = tracks.map((t, index) => `
            <div class="card" onclick="openModal(${index})">
                <img src="${t.img}" onerror="this.src='https://via.placeholder.com/500x160'">
                <div class="card-body">
                    <div style="font-weight:bold; font-size:1.1rem;">${t.n}</div>
                    <div class="tech-stack">${t.tech}</div>
                    <div class="career-tag">${t.job}</div>
                </div>
            </div>`).join('');
    }

    function openModal(index) {
        const course = tracks[index];
        document.getElementById('m-title').innerText = course.n;
        document.getElementById('m-job').innerText = "Career Goal: " + course.job;
        document.getElementById('m-syllabus').innerHTML = "<strong style='display:block;margin-bottom:10px;'>What you will learn:</strong>" + 
            course.syl.map(item => "• " + item + "<br>").join('');
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    renderGrid();
</script>
</body>
</html>
