<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Hiring & Careers</title>
    <style>
        :root { --bg: #05080f; --card: #0f172a; --accent: #38bdf8; --yellow: #fbbf24; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .ticker { background: var(--yellow); color: black; padding: 12px; text-align: center; font-weight: 800; font-size: 13px; position: sticky; top: 0; z-index: 1000; }
        
        /* JOB BOARD WITH SALARY & CONTACT */
        .job-section { padding: 40px 5%; background: rgba(56, 189, 248, 0.03); }
        .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .job-card { 
            background: var(--card); border: 2px solid var(--yellow); padding: 25px; 
            border-radius: 15px; position: relative; transition: 0.3s;
        }
        .job-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .salary-display { color: var(--green); font-size: 24px; font-weight: 900; margin: 10px 0; display: block; }
        
        .btn-train { background: var(--accent); color: black; border: none; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-contact { background: transparent; color: white; border: 1px solid white; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-contact:hover { background: white; color: black; }

        /* CONTACT MODAL */
        #contact-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; color: black; padding: 30px; border-radius: 15px; z-index: 3000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #contact-panel input, #contact-panel textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }

        /* LEARNING VIEW */
        #learning-view { display: none; height: 100vh; grid-template-columns: 1fr 380px; position: fixed; top: 0; left: 0; width: 100%; background: var(--bg); z-index: 2000; }
        .video-area { padding: 30px; overflow-y: auto; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px;}
        .video-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="ticker">📞 HIRING HOTLINE ACTIVE: CLICK 'CONTACT US' ON THE JOB BOARD TO APPLY DIRECTLY</div>

<div id="dashboard">
    <div class="job-section">
        <h2 style="margin-bottom:30px;">Available Positions & Monthly Salaries</h2>
        <div class="job-grid" id="job-list"></div>
    </div>
</div>

<div id="contact-panel">
    <h3 style="margin-top:0;">Contact Hiring Team</h3>
    <p style="font-size:12px; color:#666;">Apply for: <strong id="applying-for"></strong></p>
    <input type="text" placeholder="Your Full Name (As per Fayda ID)">
    <input type="email" placeholder="Email Address">
    <textarea placeholder="Message to Hiring Manager..." rows="4"></textarea>
    <button onclick="sendMsg()" style="width:100%; background:var(--green); color:white; border:none; padding:12px; border-radius:5px; font-weight:bold; cursor:pointer;">SEND APPLICATION</button>
    <button onclick="closeContact()" style="width:100%; background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Cancel</button>
</div>

<div id="learning-view">
    <div class="video-area">
        <button onclick="closeL()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; margin-bottom:20px;">← BACK TO JOBS</button>
        <h2 id="view-title">Course</h2>
        <div class="video-box" id="lesson-image"></div>
        <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
            <h3 id="c-sal-view" style="color:var(--green); margin-top:0;"></h3>
            <p id="writing-body"></p>
        </div>
    </div>
    <div class="sidebar" style="background:var(--card); padding:20px; border-left:1px solid #334155;">
        <h3>Course Progress</h3>
        <div id="sidebar-modules"></div>
    </div>
</div>

<script>
    const tracks = [
        {id: 1, n: "Python for AI", g: "AI Developer", price: "75,000 ETB", img: "https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=500", w: "Set up your Python environment and connect to the Ethiopian Digital Gateway API."},
        {id: 2, n: "Cyber Security", g: "Security Analyst", price: "60,000 ETB", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500", w: "Learn to audit network traffic and block unauthorized IP access to local servers."},
        {id: 3, n: "Full-Stack Web", g: "Full-Stack Dev", price: "55,000 ETB", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500", w: "Build a responsive frontend and connect it to a high-speed database."},
        {id: 4, n: "Cloud Architecture", g: "Cloud Architect", price: "85,000 ETB", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500", w: "Configure scalable cloud storage to handle government records securely."},
        {id: 15, n: "Plumbing Tech", g: "Hydraulics Lead", price: "29,000 ETB", img: "https://images.unsplash.com/photo-1585704032915-c3400ca1f963?w=500", w: "Plan and install a complex water supply system for residential buildings."}
        // ... (remaining 10 tracks follow same pattern)
    ];

    function render() {
        document.getElementById('job-list').innerHTML = tracks.map(t => `
            <div class="job-card">
                <h3 style="margin:0;">${t.g}</h3>
                <span class="salary-display">${t.price}<small style="font-size:12px; color:white; font-weight:normal;">/mo</small></span>
                <p style="font-size:13px; opacity:0.7; margin-bottom:20px;">Requires: ${t.n} Certification</p>
                <button class="btn-train" onclick="openL(${t.id})">START TRAINING</button>
                <button class="btn-contact" onclick="openContact('${t.g}')">CONTACT US</button>
            </div>`).join('');
    }

    function openL(id) {
        const t = tracks.find(x => x.id === id);
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('learning-view').style.display = 'grid';
        document.getElementById('view-title').innerText = t.n;
        document.getElementById('c-sal-view').innerText = "Target Salary: " + t.price;
        document.getElementById('writing-body').innerText = t.w;
        document.getElementById('lesson-image').innerHTML = `<img src="${t.img}">`;
        document.getElementById('sidebar-modules').innerHTML = `<div style="padding:15px; background:rgba(56,189,248,0.1); border-radius:8px; border:1px solid var(--accent);"><strong>Phase 1: Skills Training</strong></div>`;
    }

    function openContact(jobTitle) {
        document.getElementById('applying-for').innerText = jobTitle;
        document.getElementById('contact-panel').style.display = 'block';
    }

    function closeContact() {
        document.getElementById('contact-panel').style.display = 'none';
    }

    function sendMsg() {
        alert("Application Sent! The hiring team will contact you via email.");
        closeContact();
    }

    function closeL() {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('learning-view').style.display = 'none';
    }

    render();
</script>
</body>
</html>
