<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ልማት Hub | Official 2026</title>
    <style>
        :root { --dark: #0f172a; --accent: #38bdf8; --yellow: #FFD700; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #f8fafc; line-height: 1.6; }
        header { background: rgba(15, 23, 42, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent); text-decoration: none; }
        .l-btn { padding: 6px 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; border-radius: 8px; font-weight: bold; margin-left: 5px; transition: 0.3s; }
        .l-btn.active { background: var(--accent); color: var(--dark); }
        .yellow-tracker { background: var(--yellow); color: #000; padding: 10px; font-weight: 800; overflow: hidden; white-space: nowrap; }
        .scrolling-text { display: inline-block; animation: scroll 35s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .hero { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.1); padding: 60px 20px; border-radius: 30px; text-align: center; margin-bottom: 40px; }
        .id-input { background: rgba(255,255,255,0.05); border: 2px solid var(--accent); color: white; padding: 15px; width: 300px; border-radius: 12px; font-size: 1.1rem; text-align: center; margin: 20px 0; outline: none; }
        .v-btn { background: var(--accent); color: #0f172a; border: none; padding: 15px 40px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .section-h { font-size: 1.8rem; margin: 40px 0 20px; border-left: 8px solid var(--yellow); padding-left: 15px; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: rgba(30, 41, 59, 0.7); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #222; }
        .card-body { padding: 15px; }
        .tech-stack { font-size: 0.75rem; color: var(--accent); margin-top: 5px; font-weight: 600; }
        .career-tag { font-size: 0.7rem; background: rgba(56, 189, 248, 0.1); padding: 4px 8px; border-radius: 8px; display: inline-block; margin-top: 10px; color: #fff; border: 1px solid rgba(56,189,248,0.3); }
        .faq-card { background: rgba(30, 41, 59, 0.7); padding: 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        details { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        summary { font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">ልማት Hub</a>
    <div>
        <button class="l-btn active" onclick="setL('en')" id="en-btn">EN</button>
        <button class="l-btn" onclick="setL('am')" id="am-btn">አማር</button>
        <button class="l-btn" onclick="setL('om')" id="om-btn">ORM</button>
    </div>
</header>

<div class="yellow-tracker">
    <div class="scrolling-text" id="tracker-msg">Official 2026 Mission: Building Ethiopia's Technical Future. | 942,108 Citizens Enrolled.</div>
</div>

<div class="container">
    <div class="hero" id="hero-sec"></div>
    <h2 class="section-h" id="h-tr">Career Tracks</h2>
    <div class="grid" id="course-grid"></div>
    <h2 class="section-h" id="h-faq">Support & FAQ</h2>
    <div class="faq-card" id="faq-list"></div>
</div>

<footer style="text-align:center; padding:40px; color:#475569; border-top: 1px solid rgba(255,255,255,0.05);">
    © 2026 ልማት Hub | Developed by Robel
</footer>

<script>
    const tracks = [
        {n: "Modern Carpentry", img: "https://images.unsplash.com/photo-1621290621119-7d1c103bc3f1?w=400", tech: "Woodwork, Design", job: "Master Carpenter"},
        {n: "Electrical Systems", img: "https://images.unsplash.com/photo-1621905231727-07442373e43d?w=400", tech: "Solar, Smart Grid", job: "Electrician"},
        {n: "AI Engineering", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400", tech: "Python, ML", job: "AI Specialist"},
        {n: "Cyber Security", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400", tech: "Ethical Hacking", job: "Security Officer"},
        {n: "Auto Mechanics", img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=400", tech: "EV Diagnostics", job: "Technician"},
        {n: "Plumbing Tech", img: "https://images.unsplash.com/photo-1581244277943-fe4a9c777189?w=400", tech: "Modern Piping", job: "Plumber"},
        {n: "Web Systems", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=400", tech: "React, Node.js", job: "Full-Stack Dev"},
        {n: "Data Science", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400", tech: "SQL, Analysis", job: "Data Architect"},
        {n: "Welding & Metal", img: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=400", tech: "MIG Fabrication", job: "Metal Expert"},
        {n: "UI/UX Design", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?w=400", tech: "Figma, Research", job: "Designer"},
        {n: "Solar Tech", img: "https://images.unsplash.com/photo-1509391366360-fe5bb58583bb?w=400", tech: "PV Panels, Battery", job: "Solar Installer"},
        {n: "Mobile Dev", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=400", tech: "Flutter, Firebase", job: "App Developer"},
        {n: "Network Admin", img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc51?w=400", tech: "Cisco, Cloud", job: "Network Engineer"},
        {n: "Masonry Tech", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=400", tech: "Construction, CAD", job: "Master Mason"},
        {n: "Cloud Architect", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=400", tech: "AWS, Kubernetes", job: "Cloud Engineer"}
    ];

    const dict = {
        en: {w:"National Career Hub", s:"Enter 10-Digit Fayda ID", v:"START NOW", tr:"15 Career Tracks", fq:"Support & FAQ"},
        am: {w:"ብሄራዊ የሙያ ማዕከል", s:"ባለ 10 አሃዝ የፋይዳ መታወቂያ", v:"አሁን ይጀምሩ", tr:"15 የሙያ መስኮች", fq:"ጥያቄ እና መልስ"},
        om: {w:"Giddu-gala Hojii", s:"ID Faydaa galchaa", v:"AMMA JALQABI", tr:"Kallattiiwwan 15", fq:"Gaaffii fi Deebii"}
    };

    function setL(lang) {
        const d = dict[lang];
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(lang+'-btn').classList.add('active');

        document.getElementById('hero-sec').innerHTML = `
            <h1>${d.w}</h1>
            <p style="color:#94a3b8;">${d.s}</p>
            <input type="number" id="f-id" class="id-input" placeholder="0000000000"><br>
            <button onclick="alert('System Verified: Developed by Robel')" class="v-btn">${d.v}</button>`;

        document.getElementById('h-tr').innerText = d.tr;
        document.getElementById('h-faq').innerText = d.fq;
        renderGrid();
    }

    function renderGrid() {
        const g = document.getElementById('course-grid');
        g.innerHTML = tracks.map(t => `
            <div class="card">
                <img src="${t.img}" onerror="this.src='https://via.placeholder.com/400x150?text=Career+Track'">
                <div class="card-body">
                    <div style="font-weight:bold;">${t.n}</div>
                    <div class="tech-stack">${t.tech}</div>
                    <div class="career-tag">${t.job}</div>
                </div>
            </div>`).join('');

        const faqs = [
            {q: "How to access 15 tracks?", a: "Every track is unlocked once you enter your 10-digit Fayda ID."},
            {q: "Are trade toolkits free?", a: "Yes, toolkits for Carpentry, Solar, and Welding are provided at regional centers."},
            {q: "Who provides certificates?", a: "Certificates are issued by the Digital Ethiopia 2026 National Board."}
        ];
        document.getElementById('faq-list').innerHTML = faqs.map(item => `
            <details><summary>${item.q}</summary><p style="padding:10px; color:#94a3b8;">${item.a}</p></details>`).join('');
    }

    setL('en');
</script>
</body>
</html>
